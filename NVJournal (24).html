// ─── GRADE ENGINE ─────────────────────────────────────────────────────────────
function calcGradeSimple(t){const g=t.grade||calcGrade(t).grade;return g==="A+"?3:g==="A"?2:1;}
function calcGrade(s){
  const reasons=[];

  // ── Hard Block 1: C5+ on H4 or H1 (entry timeframes) ──
  const anyC5=[s.h4_candle,s.h1_candle].some(c=>c==="C5+");
  if(anyC5){
    return{grade:"B",pts:0,score:0,maxPts:9,tradeable:false,
      blocked:"C5+ on entry timeframe — not tradeable",modelType:"",
      reasons:[{label:"C5+ Candle",met:false,note:"Hard block"}]};
  }

  // ── Hard Block 2: H1 not in trade direction ──
  // H1 bias must match direction (Long=Bullish, Short=Bearish)
  const dirBias=s.direction==="Long"?"Bullish":"Bearish";
  const h1InDir=s.h1_bias===dirBias;
  if(!h1InDir){
    return{grade:"B",pts:0,score:0,maxPts:9,tradeable:false,
      blocked:"H1 bias conflicts with trade direction — not tradeable",modelType:"",
      reasons:[{label:"H1 Alignment",met:false,note:`H1 is ${s.h1_bias}, need ${dirBias}`}]};
  }

  // ── Hard Block 3: No sweep AND no SMT ──
  const hasSMT=!!s.smt;
  const sweepCount=[s.sweep_h4,s.sweep_h1,s.smt].filter(Boolean).length;
  const dualSweep=sweepCount>=2;
  const anySweep=sweepCount>=1;
  if(!anySweep){
    return{grade:"B",pts:0,score:0,maxPts:9,tradeable:false,
      blocked:"No sweep and no SMT — need at least one",modelType:"",
      reasons:[{label:"Sweep/SMT",met:false,note:"Hard block"}]};
  }

  // ── Alignment tiers (H1 already confirmed in direction) ──
  const allAl=s.daily_bias===dirBias&&s.h4_bias===dirBias&&s.h1_bias===dirBias;
  const h4h1Al=s.h4_bias===dirBias&&s.h1_bias===dirBias;
  const dh1Al=s.daily_bias===dirBias&&s.h1_bias===dirBias;
  // H1 only (no D or H4) — weak but H1 is confirmed
  const h1Only=h1InDir&&!h4h1Al&&!dh1Al;

  // ── Core requirements ──
  const cisdH1=!!s.cisd_h1;
  const cisd5M=!!s.ltf_5m_cisd;
  const hasKeyZone=!!(s.key_zone&&s.key_zone!=="None");

  // ── Extras ──
  const hasPSP=!!s.psp;
  const hasGU=!!s.gu_confirm;
  const hasDisp=!!s.displacement;
  const htfStruct=[s.htf_daily,s.htf_h4,s.htf_h1].filter(Boolean).length;
  const candleOk=[s.daily_candle,s.h4_candle,s.h1_candle].some(c=>c==="C2"||c==="C3");
  const extraCount=[hasSMT,hasPSP,hasGU,hasDisp,htfStruct>=1,cisd5M,candleOk].filter(Boolean).length;

  // ══ A+ PATHS ══
  // Path 1: Full alignment + dual sweep + key zone + CISD H1
  const apPath1=allAl&&dualSweep&&hasKeyZone&&cisdH1;
  // Path 2: H4+H1 + dual sweep + key zone + CISD H1 + 5M
  const apPath2=h4h1Al&&dualSweep&&hasKeyZone&&cisdH1&&cisd5M;
  // Path 3: Daily+H1 + sweep + SMT + key zone + CISD H1
  const apPath3=dh1Al&&anySweep&&hasSMT&&hasKeyZone&&cisdH1;
  // Path 4: H4+H1 or Full + single sweep + key zone + CISD H1 + 3+ extras (very strong stack)
  const apPath4=(allAl||h4h1Al)&&anySweep&&hasKeyZone&&cisdH1&&extraCount>=3;
  // Path 5: H1 only but exceptional — dual sweep + CISD H1 + key zone + SMT + 4+ extras
  const apPath5=h1Only&&dualSweep&&hasSMT&&hasKeyZone&&cisdH1&&extraCount>=4;

  // ══ A PATHS ══
  // A: H1 confirmed + key zone + CISD H1 + (sweep or SMT) + at least partial alignment
  const aBase=(h4h1Al||dh1Al)&&hasKeyZone&&cisdH1&&(anySweep||hasSMT);
  // A: H1 only but has sweep + CISD H1 + key zone + good extras
  const aH1Only=h1Only&&hasKeyZone&&cisdH1&&anySweep&&extraCount>=2;

  let grade,modelType;
  if(apPath1){grade="A+";modelType="Full Alignment";}
  else if(apPath2){grade="A+";modelType="Dual Sweep";}
  else if(apPath3){grade="A+";modelType="Daily+H1";}
  else if(apPath4){grade="A+";modelType="Strong Stack";}
  else if(apPath5){grade="A+";modelType="Exceptional Stack";}
  else if(aBase){grade="A";modelType=h4h1Al?"H4+H1":"Daily+H1";}
  else if(aH1Only){grade="A";modelType="H1+Sweep";}
  else{grade="B";modelType="";}

  // ── Reasons for Grade Meter display ──
  const addR=(label,met,note="")=>reasons.push({label,met,note});
  const alLabel=allAl?"All 3 TFs":h4h1Al?"H4+H1":dh1Al?"Daily+H1":"H1 only";
  addR("H1 Direction",true,`H1 ${s.h1_bias} ✓`);
  addR("HTF Alignment",allAl||h4h1Al||dh1Al,alLabel);
  addR("CISD H1",cisdH1,cisdH1?(cisd5M?"H1+5M":"H1 only"):"MISSING");
  addR("Key Zone",hasKeyZone,hasKeyZone?s.key_zone:"MISSING");
  const sweepDesc=sweepCount>=2?`${sweepCount}x signals (dual)`:sweepCount===1?[s.sweep_h4?"Sweep H4":null,s.sweep_h1?"Sweep H1":null,s.smt?"SMT":null].filter(Boolean).join("+"):"None";
  addR("Sweep/SMT",anySweep,sweepDesc);
  addR("Candle",candleOk,[s.daily_candle,s.h4_candle,s.h1_candle].join("/"));
  if(cisd5M)addR("5M CISD",true,"Execution");
  if(hasPSP)addR("PSP",true,"");
  if(hasGU)addR("GU Confirm",true,"");
  if(hasDisp)addR("Displacement",true,"");
  if(htfStruct)addR("HTF Structure",true,`${htfStruct} TF`);

  const score=grade==="A+"?9:grade==="A"?6:3;
  return{grade,pts:score,score,maxPts:9,tradeable:grade!=="B",blocked:null,modelType,reasons};
}

function useStorage(key,init){
  const [val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):init;}catch{return init;}
  });

}

// ─── METRICS ──────────────────────────────────────────────────────────────────
function getEffectiveR(t, useHypo=false){
  if(t.trade_taken) return parseFloat(t.r_result||0);
  if(!useHypo) return null;
  // Not taken — priority: hypo_result > r_result > hypo_outcome > outcome
  if(t.hypo_result&&t.hypo_result!=="") return parseFloat(t.hypo_result);
  // Old Notion imports store result in r_result + outcome even for not-taken
  if(t.r_result&&t.r_result!=="") return parseFloat(t.r_result);
  // Derive from outcome fields
  const o=t.hypo_outcome||t.outcome||"NT";
  if(o==="W") return 2;
  if(o==="L") return -1;
  if(o==="BE") return 0;
  return 0; // No data — count as 0R in denominator
}
function calcMetrics(trades, onlyTaken=true){
  // Build working set with effective R
  const useHypo=!onlyTaken;
  const ex=trades.map(t=>({...t,_r:getEffectiveR(t,useHypo)})).filter(t=>t._r!==null);
  if(!ex.length)return{total:0,totalR:0,winRate:0,expectancy:0,profitFactor:0,posR:0,negR:0,wins:0,losses:0,be:0,avgWin:0,avgLoss:0,maxWinStreak:0,maxLossStreak:0,curStreak:0,curStreakType:"",maxDrawdown:0,bestTrade:null,worstTrade:null};
  const rr=ex.map(t=>t._r);
  const totalR=+rr.reduce((s,r)=>s+r,0).toFixed(2);
  const wa=rr.filter(r=>r>0),la=rr.filter(r=>r<0);
  const posR=+wa.reduce((s,r)=>s+r,0).toFixed(2);
  const negR=+Math.abs(la.reduce((s,r)=>s+r,0)).toFixed(2);
  const wins=wa.length,losses=la.length,total=ex.length;
  // streaks
  let mxW=0,mxL=0,cW=0,cL=0;
  rr.forEach(r=>{if(r>0){cW++;cL=0;mxW=Math.max(mxW,cW);}else if(r<0){cL++;cW=0;mxL=Math.max(mxL,cL);}else{cW=0;cL=0;}});
  let curStreak=0,curStreakType="";
  for(let i=rr.length-1;i>=0;i--){
    if(rr[i]>0&&(curStreakType===""||curStreakType==="W")){curStreak++;curStreakType="W";}
    else if(rr[i]<0&&(curStreakType===""||curStreakType==="L")){curStreak++;curStreakType="L";}
    else break;
  }
  // drawdown
  let peak=0,maxDD=0,cum=0;
  rr.forEach(r=>{cum+=r;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>maxDD)maxDD=dd;});
  // best/worst
  // Best = highest R winner, tiebreak by grade. Worst = biggest loss only.
  const winners=ex.filter(t=>t._r>0);
  const losers=ex.filter(t=>t._r<0);
  const gradeVal=g=>g==="A+"?3:g==="A"?2:1;
  const bestTrade=winners.length?winners.reduce((b,t)=>{const br=parseFloat(b.r_result),tr=parseFloat(t.r_result);return tr>br||(tr===br&&gradeVal(t.grade||"B")>gradeVal(b.grade||"B"))?t:b}):null;
  const worstTrade=losers.length?losers.reduce((b,t)=>parseFloat(t.r_result)<parseFloat(b.r_result)?t:b):null;
  return{
    total,totalR,wins,losses,be:total-wins-losses,
    winRate:+(wins/total*100).toFixed(1),
    expectancy:+(totalR/total).toFixed(2),
    profitFactor:negR===0?posR:+(posR/negR).toFixed(2),
    posR,negR,
    avgWin:wins?+(posR/wins).toFixed(2):0,
    avgLoss:losses?+(negR/losses).toFixed(2):0,
    maxWinStreak:mxW,maxLossStreak:mxL,
    curStreak,curStreakType,
    maxDrawdown:+maxDD.toFixed(2),
    bestTrade,worstTrade,
  };
}

const today=()=>new Date().toISOString().split("T")[0];
function getWeekKey(d){
  const date=new Date(d),day=date.getDay();
  const diff=date.getDate()-day+(day===0?-6:1);
  return new Date(date.setDate(diff)).toISOString().split("T")[0];
}
function filterByPeriod(trades,period){
  const now=today();
  if(period==="Week") return trades.filter(t=>getWeekKey(t.date)===getWeekKey(now));
  if(period==="Month")return trades.filter(t=>t.date.slice(0,7)===now.slice(0,7));
  if(period==="YTD")  return trades.filter(t=>t.date.slice(0,4)===now.slice(0,4));
  return trades;
}

// ─── TRADE DETAIL PANEL ───────────────────────────────────────────────────────
function TradeDetail({trade,C,isDark,onClose,onSave}){
  const [editing,setEditing]=useState(false);
  const [ed,setEd]=useState(trade);
  useEffect(()=>{setEd(trade);setEditing(false);},[trade]);
  if(!trade)return null;
  const gr=calcGrade(editing?ed:trade);
  const grade=(editing?ed:trade).grade||gr.grade;

const DONUT_COLORS = ["#00d4aa","#3b8bff","#f59e0b","#ef4444","#8b5cf6","#ec4899","#10b981","#f97316"];

function DonutChart({slices, C, isDark}){
  const total = slices.reduce((s,x)=>s+x.val,0);
  if(!total) return null;
  let cumAngle = -90;
  const R=70, cx=90, cy=90, gap=2;
  const paths = slices.map((s,i)=>{
    const pct = s.val/total;
    const angle = pct*360 - gap;
    const start = cumAngle;
    cumAngle += pct*360;
    const r1=start*(Math.PI/180), r2=(start+angle)*(Math.PI/180);
    const x1=cx+R*Math.cos(r1), y1=cy+R*Math.sin(r1);
    const x2=cx+R*Math.cos(r2), y2=cy+R*Math.sin(r2);
    const lg = angle>180?1:0;
    return {path:`M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} Z`, color:DONUT_COLORS[i%DONUT_COLORS.length], label:s.sym, pct:(pct*100).toFixed(1)};
  });
  return(
    <div style={{display:"flex",alignItems:"center",gap:20}}>
      <svg width={180} height={180} viewBox="0 0 180 180">
        <circle cx={cx} cy={cy} r={42} fill={isDark?"#0d0d0d":C.surface}/>
        {paths.map((p,i)=><path key={i} d={p.path} fill={p.color} opacity={0.9}/>)}
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {paths.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:2,background:p.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>{p.label}</span>
            <span style={{fontSize:10,color:C.textDim}}>{p.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CryptoTracker({C, isDark}){
  const [holdings, setHoldings] = useState(()=>{
    try{ const s=localStorage.getItem("nv_crypto_v2"); return s?JSON.parse(s):DEFAULT_HOLDINGS; }catch{return DEFAULT_HOLDINGS;}
  });
  const [prices, setPrices] = useState({});
  const [fetching, setFetching] = useState(false);
  const [lastFetch, setLastFetch] = useState("");
  const [editId, setEditId] = useState(null);
  const [editBuf, setEditBuf] = useState({});
  const [addRow, setAddRow] = useState(false);
  const [newH, setNewH] = useState({sym:"",units:"",avg_cost:""});

  // Sync holdings to localStorage
  useEffect(()=>{ try{localStorage.setItem("nv_crypto_v2",JSON.stringify(holdings));}catch{} },[holdings]);

  // Load from Supabase on mount
  useEffect(()=>{
    (async()=>{
      const data = await sbLoad("crypto");
      if(data!==null && data.length>0) setHoldings(data);
    })();
  },[]);

  // Save all holdings to Supabase whenever they change (debounced)
  useEffect(()=>{
    const t = setTimeout(()=>{
      holdings.forEach(h => sbSave("crypto", h));
    }, 800);
    return ()=>clearTimeout(t);
  },[holdings]);

  async function fetchPrices(){
    const ids = [...new Set(holdings.map(h=>COIN_IDS[h.sym.toUpperCase()]).filter(Boolean))];
    if(!ids.length) return;
    setFetching(true);
    try{
      const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=usd`);
      const data = await r.json();
      const map={};
      Object.entries(COIN_IDS).forEach(([sym,id])=>{ if(data[id]?.usd) map[sym]=data[id].usd; });
      setPrices(map);
      setLastFetch(new Date().toLocaleTimeString());
    }catch(e){ console.warn("CoinGecko failed",e); }
    setFetching(false);
  }

  useEffect(()=>{ fetchPrices(); },[]);

    setHoldings(p=>[...p,{...newH,sym:newH.sym.toUpperCase(),id:Date.now()}]);
    setNewH({sym:"",units:"",avg_cost:""});
    setAddRow(false);
    setTimeout(fetchPrices,300);
  }

  const rows = holdings.map(h=>{

    const value=units*price;
    const pnl=value-invested;
    const pnlPct=invested>0?(pnl/invested*100):0;
    return{...h,units,avgCost,price,invested,value,pnl,pnlPct};
  });

  const totalPnlPct=totalInvested>0?(totalPnl/totalInvested*100):0;

  const inp={background:isDark?"#111":"#fff",color:isDark?"#fff":"#000",border:`1px solid ${isDark?"#333":"#ccc"}`,borderRadius:4,padding:"3px 7px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,width:"90px",outline:"none"};

    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* ── Summary row ── */}

  );
}

    <div style={{padding:"9px 12px",background:C.surface,borderRadius:8,border:`1px solid ${isPending?C.yellow:editing?C.accent:C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",boxShadow:C.shadow}}>

            <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>BIAS</div>
              <select value={ed.bias} onChange={e=>setEd(p=>({...p,bias:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}>
                {BIAS_OPTS.map(b=><option key={b}>{b}</option>)}</select></div>
            <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>OUTCOME</div>
              <select value={ed.outcome||""} onChange={e=>setEd(p=>({...p,outcome:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}>
                <option value="">Pending</option>
                {BIAS_OUT.map(b=><option key={b}>{b}</option>)}</select></div>
          </div>
          <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>NOTES</div>
            <input value={ed.notes||""} onChange={e=>setEd(p=>({...p,notes:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}/></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={saveEd} style={{padding:"4px 14px",background:C.accent,border:"none",color:isDark?"#000":"#fff",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>✓ Save</button>
            <button onClick={()=>setEditing(false)} style={{padding:"4px 14px",background:"transparent",border:`1px solid ${C.border}`,color:C.textMid,borderRadius:5,fontSize:11,cursor:"pointer"}}>Cancel</button>

function NVJournal(){
  const [isDark,setIsDark]=useStorage("nv_theme",true);
  const C=isDark?DARK:LIGHT;
  const [trades,setTrades]=useState(()=>{try{const s=localStorage.getItem("nv_trades_v5");return s?JSON.parse(s):[];}catch{return[];}});
  const [days,setDays]=useState(()=>{try{const s=localStorage.getItem("nv_days_v2");return s?JSON.parse(s):[];}catch{return[];}});
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{try{localStorage.setItem("nv_trades_v5",JSON.stringify(trades));}catch{}},[trades]);
  useEffect(()=>{try{localStorage.setItem("nv_days_v2",JSON.stringify(days));}catch{}},[days]);
  useEffect(()=>{
    (async()=>{
      setSyncing(true);
      const [t,d]=await Promise.all([sbLoad("trades"),sbLoad("days")]);
      if(t!==null)setTrades(t);
      if(d!==null)setDays(d);
      setSyncing(false);
    })();
  },[]);
  const [tab,setTab]=useState("Dashboard");
  function switchTab(t){setTab(t);window.scrollTo({top:0,behavior:"instant"});}
  const [period,setPeriod]=useState("All");
  const [dashView,setDashView]=useState("Live"); // Live / All
  const [tradesView,setTradesView]=useState("Live"); // Live / All
  const [tradeFilters,setTradeFilters]=useState({grade:"All",session:"All",direction:"All",pair:"All",outcome:"All"});
  const [tf,setTf]=useState(INIT_TRADE());
  const [df,setDf]=useState(INIT_DAY());
  const [selected,setSelected]=useState(new Set());
  const [detailTrade,setDetailTrade]=useState(null);

  // Dashboard data source
  const dashSource=useMemo(()=>dashView==="Live"?trades.filter(t=>t.trade_taken):trades,[trades,dashView]);
  const dashFiltered=useMemo(()=>filterByPeriod(dashSource,period),[dashSource,period]);
  const metrics=useMemo(()=>calcMetrics(dashFiltered, dashView==="Live"),[dashFiltered,dashView]);

  // Trades tab data source
  const tradesSource=useMemo(()=>tradesView==="Live"?trades.filter(t=>t.trade_taken):trades,[trades,tradesView]);
  const tradesFiltered=useMemo(()=>{
    let t=filterByPeriod(tradesSource,period);
    if(tradeFilters.grade!=="All") t=t.filter(x=>x.grade===tradeFilters.grade);
    if(tradeFilters.session!=="All") t=t.filter(x=>x.session===tradeFilters.session);
    if(tradeFilters.direction!=="All") t=t.filter(x=>x.direction===tradeFilters.direction);
    if(tradeFilters.pair!=="All") t=t.filter(x=>x.pair===tradeFilters.pair);
    if(tradeFilters.outcome!=="All"){
      if(tradeFilters.outcome==="W") t=t.filter(x=>parseFloat(x.r_result||0)>0||(x.outcome||x.hypo_outcome)==="W");
      else if(tradeFilters.outcome==="L") t=t.filter(x=>parseFloat(x.r_result||0)<0||(x.outcome||x.hypo_outcome)==="L");
      else if(tradeFilters.outcome==="BE") t=t.filter(x=>parseFloat(x.r_result||0)===0&&x.trade_taken);
      else if(tradeFilters.outcome==="NT") t=t.filter(x=>!x.trade_taken);
    }
    return t;
  },[tradesSource,period,tradeFilters]);
  const tradesMetrics=useMemo(()=>calcMetrics(tradesFiltered,tradesView==="Live"),[tradesFiltered,tradesView]);

  const gradeResult=useMemo(()=>calcGrade(tf),[tf]);
  const updTf=(k,v)=>setTf(f=>({...f,[k]:v}));
  const updDf=(k,v)=>setDf(f=>({...f,[k]:v}));
  const togConf=k=>updTf(k,!tf[k]);

  function exportCSV(){
    const headers=["date","pair","session","direction","grade","trade_taken","r_result","outcome","hypo_result","hypo_outcome","no_trade_reason","hesitation","key_zone","notes","chart_link",...ALL_CONFS.map(c=>c.key),"ltf_5m_cisd"];
    const rows=trades.map(t=>headers.map(h=>{const v=t[h];return typeof v==="boolean"?(v?"1":"0"):(v??"")}));
    const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`NVJournal_${today()}.csv`;a.click();
  }
  function importCSV(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const lines=e.target.result.split("\n").filter(Boolean);
      if(lines.length<2){alert("Empty CSV");return;}
      const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
      const imported=lines.slice(1).map(line=>{
        const vals=[];let cur="",inQ=false;
        for(const ch of line){if(ch==="\""){inQ=!inQ;}else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}
        vals.push(cur);
        const obj={id:Date.now()+Math.random()};
        headers.forEach((h,i)=>{
          const v=(vals[i]||"").replace(/"/g,"").trim();
          obj[h]=v==="1"?true:v==="0"?false:v;
        });
        if(!obj.grade)obj.grade=calcGrade(obj).grade;
        return obj;
      });
      if(window.confirm(`Import ${imported.length} trades? This will ADD to existing trades.`)){
        setTrades(p=>[...p,...imported]);
        imported.forEach(r=>sbSave("trades",r));
        alert(`Imported ${imported.length} trades successfully!`);
      }
    };
    reader.readAsText(file);
  }
  function saveTrade(){
    if(tf.trade_taken&&tf.r_result===""){alert("Enter R Result");return;}
    const gr=calcGrade(tf);
    const rec={...tf,grade:gr.grade,score:gr.score,id:Date.now()};
    setTrades(p=>[...p,rec]);
    setTf(INIT_TRADE());
    sbSave("trades",rec);
  }
  function saveDay(){const rec={...df,id:Date.now()};setDays(p=>[...p,rec]);setDf(INIT_DAY());sbSave("days",rec);}
  function deleteSelected(){
    if(!selected.size)return;
    if(window.confirm(`Delete ${selected.size} trade(s)?`)){const ids=[...selected];ids.forEach(id=>sbDel("trades",id));setTrades(p=>p.filter(t=>!ids.includes(t.id)));setSelected(new Set());}
  }
  function clearAll(){
    if(window.confirm("Delete ALL data? Cannot be undone.")){trades.forEach(t=>sbDel("trades",t.id));days.forEach(d=>sbDel("days",d.id));setTrades([]);setDays([]);setSelected(new Set());setDetailTrade(null);}
  }
  function togSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function togSelectAll(list){
    const ids=list.map(t=>t.id);
    const allSel=ids.every(id=>selected.has(id));
    if(allSel)setSelected(s=>{const n=new Set(s);ids.forEach(id=>n.delete(id));return n;});
    else setSelected(s=>{const n=new Set(s);ids.forEach(id=>n.add(id));return n;});
  }

  const CSS=`
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:${C.bg};color:${C.text};font-family:'Inter',sans-serif;min-height:100vh;}
    ::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:${C.bg};}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px;}
    input,select,textarea{background:${isDark?"#0d0d0d":"#fff"};color:${C.text};border:1px solid ${isDark?"#333":C.border};border-radius:5px;padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;outline:none;transition:border-color .15s;}
    input:focus,select:focus,textarea:focus{border-color:${C.accentDim};box-shadow:0 0 0 2px ${C.accentGlow};}
    select option{background:${isDark?"#111":"#fff"};}
    textarea{resize:vertical;}button{cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
    input[type=checkbox]{width:14px;height:14px;accent-color:${C.accent};cursor:pointer;}
    .lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:${C.textDim};font-weight:600;display:block;margin-bottom:4px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .fade{animation:fadeUp .18s ease forwards;}
  `;

  // ── Shared UI ──
  const Card=({children,style={}})=><div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:C.shadow,...style}}>{children}</div>;


  const PositionCalcInner=()=>{
    const [mode,setMode]=useState("fx");
    const [acct,setAcct]=useState(()=>+(localStorage.getItem("nv_calc_acct")||10000));
    const [riskPct,setRiskPct]=useState(()=>+(localStorage.getItem("nv_calc_risk")||1));
    const [stopPips,setStopPips]=useState(10);
    const [fxSelected,setFxSelected]=useState(["EURUSD","GBPUSD"]);
    const [stopTicks,setStopTicks]=useState(10);
    const [futSelected,setFutSelected]=useState(["6E","M6E","6B","M6B","ES","MES","NQ","MNQ"]);
    useEffect(()=>{localStorage.setItem("nv_calc_acct",acct);},[acct]);
    useEffect(()=>{localStorage.setItem("nv_calc_risk",riskPct);},[riskPct]);
    const riskDollar=+(acct*(riskPct/100)).toFixed(2);
    const toggleFx=sym=>setFxSelected(s=>s.includes(sym)?s.filter(x=>x!==sym):[...s,sym]);
    const toggleFut=sym=>setFutSelected(s=>s.includes(sym)?s.filter(x=>x!==sym):[...s,sym]);
    const inp2={background:isDark?"#0d0d0d":"#fff",color:isDark?"#fff":"#000",border:`1px solid ${isDark?"#333":"#ccc"}`,borderRadius:5,padding:"7px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:13,width:"100%",outline:"none",boxSizing:"border-box"};
    const fxResults=FX_PAIRS.filter(p=>fxSelected.includes(p.sym)).map(p=>{
      const totalPipRisk=stopPips*p.pipVal;
      const stdLots=totalPipRisk>0?riskDollar/totalPipRisk:0;
      const actualRisk=+(stdLots*totalPipRisk).toFixed(2);
      return{...p,stdLots:+stdLots.toFixed(2),miniLots:+(stdLots*10).toFixed(1),microLots:+(stdLots*100).toFixed(0),actualRisk,actualPct:acct>0?+((actualRisk/acct)*100).toFixed(2):0};
    });
    const futResults=FUTURES_ASSETS.filter(a=>futSelected.includes(a.sym)).map(a=>{
      const rpc=+(stopTicks*a.tickVal).toFixed(2);
      const contracts=rpc>0?Math.floor(riskDollar/rpc):0;
      const actualRisk=+(contracts*rpc).toFixed(2);
      return{...a,rpc,contracts,actualRisk,actualRiskPct:acct>0?+((actualRisk/acct)*100).toFixed(2):0};
    });
    const thStyle={padding:"8px 12px",textAlign:"left",fontSize:9,letterSpacing:".1em",textTransform:"uppercase",color:C.textDim,fontWeight:600,borderBottom:`1px solid ${C.border}`};
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <Sect style={{margin:0,flex:1}}>Position Size Calculator</Sect>
          <div style={{display:"flex",background:isDark?"#111":"#eee",borderRadius:8,padding:2,gap:2,marginLeft:16}}>
            {[["fx","FX / Forex"],["futures","Futures"]].map(([m,lb])=>(
              <button key={m} onClick={()=>setMode(m)} style={{padding:"5px 18px",borderRadius:6,border:"none",background:mode===m?(isDark?"#fff":"#000"):"transparent",color:mode===m?(isDark?"#000":"#fff"):C.textDim,fontSize:11,fontWeight:700,cursor:"pointer"}}>
                {lb}
              </button>
            ))}
          </div>
        </div>
        <Card>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:14}}>
            <div><span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Account Size ($)</span><input style={inp2} type="number" value={acct} onChange={e=>setAcct(+e.target.value)} step="1000"/></div>
            <div><span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Risk % per Trade</span><input style={inp2} type="number" value={riskPct} onChange={e=>setRiskPct(+e.target.value)} step="0.25" min="0.1" max="10"/></div>
            {mode==="fx"
              ?<div><span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Stop Loss (Pips)</span><input style={inp2} type="number" value={stopPips} onChange={e=>setStopPips(+e.target.value)} step="1" min="1"/></div>
              :<div><span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Stop Loss (Ticks)</span><input style={inp2} type="number" value={stopTicks} onChange={e=>setStopTicks(+e.target.value)} step="1" min="1"/></div>
            }
          </div>
          <div style={{padding:"10px 14px",background:isDark?"#000":"#f5f5f5",borderRadius:7,display:"flex",gap:24,flexWrap:"wrap"}}>
            {[["Risk $",`$${riskDollar.toLocaleString()}`,C.red],["Account",`$${acct.toLocaleString()}`,C.accent],["Risk %",`${riskPct}%`,C.yellow],["2R Target",`$${(riskDollar*2).toLocaleString()}`,C.green]].map(([l,v,col])=>(
              <div key={l}><span style={{fontSize:9,color:C.textDim,textTransform:"uppercase",letterSpacing:".1em"}}>{l}</span><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:col}}>{v}</div></div>
            ))}
          </div>
        </Card>
        {mode==="fx"&&(<>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {FX_PAIRS.map(p=>(
              <button key={p.sym} onClick={()=>toggleFx(p.sym)} style={{padding:"4px 14px",borderRadius:20,border:`1px solid ${fxSelected.includes(p.sym)?C.accent:C.border}`,background:fxSelected.includes(p.sym)?C.accentGlow:"transparent",color:fxSelected.includes(p.sym)?C.accent:C.textDim,fontSize:11,fontWeight:fxSelected.includes(p.sym)?700:400,fontFamily:"'JetBrains Mono',monospace"}}>
                {p.sym}
              </button>
            ))}
          </div>
          {fxResults.length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",boxShadow:C.shadow}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:isDark?"#000":"#f5f5f5"}}>{["Pair","Name","$/pip","Std Lots","Mini Lots","Micro Lots","Actual Risk","Actual %"].map(h=><th key={h} style={thStyle}>{h}</th>)}</tr></thead>
                <tbody>{fxResults.map((p,i)=>(
                  <tr key={p.sym} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":isDark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.01)"}}>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:["EURUSD","GBPUSD"].includes(p.sym)?C.accent:C.textMid}}>{p.sym}</td>
                    <td style={{padding:"10px 12px",fontSize:11,color:C.textMid}}>{p.name}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMid}}>${p.pipVal}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:p.stdLots>=1?C.green:C.yellow}}>{p.stdLots}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.green}}>{p.miniLots}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:20,color:C.green}}>{p.microLots}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.red}}>${p.actualRisk.toLocaleString()}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.yellow}}>{p.actualPct}%</td>
                  </tr>
                ))}</tbody>
              </table>
              <div style={{padding:"8px 14px",background:isDark?"#000":"#f9f9f9",borderTop:`1px solid ${C.border}`,fontSize:10,color:C.textDim}}>
                Pip values per standard lot (100k units) · Mini = 10k · Micro = 1k · USDJPY estimated
              </div>
            </div>
          )}
        </>)}
        {mode==="futures"&&(<>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {FUTURES_ASSETS.map(a=>(
              <button key={a.sym} onClick={()=>toggleFut(a.sym)} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${futSelected.includes(a.sym)?C.accent:C.border}`,background:futSelected.includes(a.sym)?C.accentGlow:"transparent",color:futSelected.includes(a.sym)?C.accent:C.textDim,fontSize:11,fontWeight:futSelected.includes(a.sym)?700:400}}>
                {a.sym}
              </button>
            ))}
          </div>
          {futResults.length>0&&(
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",boxShadow:C.shadow}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr style={{background:isDark?"#000":"#f5f5f5"}}>{["Asset","Name","Tick Value","Risk/Contract","Contracts","Actual Risk","Actual %"].map(h=><th key={h} style={thStyle}>{h}</th>)}</tr></thead>
                <tbody>{futResults.map((a,i)=>(
                  <tr key={a.sym} style={{borderBottom:`1px solid ${C.border}`,background:i%2===0?"transparent":isDark?"rgba(255,255,255,0.02)":"rgba(0,0,0,0.01)"}}>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:16,color:["6E","M6E","6B","M6B"].includes(a.sym)?C.accent:C.textMid}}>{a.sym}</td>
                    <td style={{padding:"10px 12px",fontSize:11,color:C.textMid}}>{a.name}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMid}}>${a.tickVal}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.red}}>${a.rpc}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:a.contracts>0?C.green:C.textDim}}>{a.contracts}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.red}}>${a.actualRisk.toLocaleString()}</td>
                    <td style={{padding:"10px 12px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.yellow}}>{a.actualRiskPct}%</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          )}
        </>)}
      </div>
    );
  };
  const DowChart=({days})=>{
    const DOW=["Mon","Tue","Wed","Thu","Fri"];
    const valid=days.filter(d=>d.outcome&&d.outcome!=="Trash Day");
    const dowStats=DOW.map((name,i)=>{
      const dayNum=i+1;
      const dd=valid.filter(d=>{const dt=new Date(d.date);return dt.getDay()===dayNum;});
      const correct=dd.filter(d=>d.outcome==="Correct").length;
      const acc=dd.length?Math.round(correct/dd.length*100):null;
      return{name,total:dd.length,correct,acc};
    });
    return(
      <Card>
        <span className="lbl" style={{marginBottom:12}}>Bias Accuracy by Day of Week</span>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
          {dowStats.map(({name,total,correct,acc})=>{
            const col=acc===null?C.textDim:acc>=65?C.green:acc>=45?C.yellow:C.red;
            const barH=acc!==null?Math.round((acc/100)*60):0;
            return(
              <div key={name} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                <div style={{fontSize:9,color:C.textDim,letterSpacing:".08em"}}>{name}</div>
                <div style={{height:60,display:"flex",alignItems:"flex-end",width:"100%",justifyContent:"center"}}>
                  <div style={{width:28,height:barH,background:col,borderRadius:"3px 3px 0 0",minHeight:acc!==null?2:0,transition:"height .4s"}}/>
                </div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:18,color:col}}>{acc!==null?`${acc}%`:"—"}</div>
                <div style={{fontSize:9,color:C.textDim}}>{total>0?`${correct}/${total}`:""}</div>
              </div>
            );
          })}
        </div>
      </Card>
    );
  };

  const DayRow=({d,onConfirm,onSave,onDelete})=>{
    const [editing,setEditing]=useState(false);
    const [ed,setEd]=useState(d);
    useEffect(()=>{setEd(d);setEditing(false);},[d.id]);
    const isPending=!d.outcome||d.outcome==="";
    const bc=d.outcome==="Correct"?C.green:d.outcome==="Wrong"?C.red:d.outcome==="Trash Day"?C.textDim:C.yellow;
    const saveEd=()=>{onSave({...ed});setEditing(false);};
    return(
      <div style={{padding:"9px 12px",background:C.surface,borderRadius:8,border:`1px solid ${isPending?C.yellow:editing?C.accent:C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",boxShadow:C.shadow}}>
        {!editing?(
          <div style={{display:"grid",gridTemplateColumns:"100px 90px 1fr 1fr 60px",gap:8,alignItems:"center"}}>
            <span style={{color:C.textMid}}>{d.date}</span>
            <span style={{color:d.bias==="Bullish"?C.green:d.bias==="Bearish"?C.red:C.textMid,fontWeight:600}}>{d.bias}</span>
            {isPending?(
              <div style={{display:"flex",alignItems:"center",gap:6,gridColumn:"3/5"}}>
                <span style={{fontSize:10,color:C.yellow}}>⏳ Awaiting confirmation</span>
                <select defaultValue="" onChange={e=>{if(!e.target.value)return;onConfirm(d.id,e.target.value);}} style={{fontSize:10,padding:"2px 6px",background:isDark?"#0d0d0d":"#fff",color:C.text,border:`1px solid ${C.yellow}`,borderRadius:4}}>
                  <option value="">Confirm...</option>
                  {BIAS_OUT.map(b=><option key={b}>{b}</option>)}
                </select>
              </div>
            ):(
              <>
                <span style={{color:bc,fontWeight:600}}>{d.outcome}</span>
                <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{d.notes}</span>
              </>
            )}
            <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
              <button onClick={()=>{setEd(d);setEditing(true);}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"2px 7px",fontSize:9,cursor:"pointer"}}>✏</button>
              <button onClick={()=>onDelete(d.id)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"2px 6px",fontSize:9,cursor:"pointer"}}>✕</button>
            </div>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>DATE</div>
                <input type="date" value={ed.date} onChange={e=>setEd(p=>({...p,date:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}/></div>
              <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>BIAS</div>
                <select value={ed.bias} onChange={e=>setEd(p=>({...p,bias:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}>
                  {BIAS_OPTS.map(b=><option key={b}>{b}</option>)}</select></div>
              <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>OUTCOME</div>
                <select value={ed.outcome||""} onChange={e=>setEd(p=>({...p,outcome:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}>
                  <option value="">Pending</option>
                  {BIAS_OUT.map(b=><option key={b}>{b}</option>)}</select></div>
            </div>
            <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>NOTES</div>
              <input value={ed.notes||""} onChange={e=>setEd(p=>({...p,notes:e.target.value}))} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,boxSizing:"border-box"}}/></div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={saveEd} style={{padding:"4px 14px",background:C.accent,border:"none",color:isDark?"#000":"#fff",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer"}}>✓ Save</button>
              <button onClick={()=>setEditing(false)} style={{padding:"4px 14px",background:"transparent",border:`1px solid ${C.border}`,color:C.textMid,borderRadius:5,fontSize:11,cursor:"pointer"}}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    );
  };
  const Sect=({children})=><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:".14em",color:C.textMid,borderBottom:`1px solid ${C.border}`,paddingBottom:8,marginBottom:14}}>{children}</div>;
  const Fld=({label,children})=><div><span className="lbl">{label}</span>{children}</div>;

  const Toggle2=({val,a,b,onChange})=>(
    <div style={{display:"flex",gap:2,background:isDark?"#000":C.surfaceHigh,borderRadius:7,padding:3,border:`1px solid ${C.border}`}}>
      {[a,b].map(opt=>(
        <button key={opt} onClick={()=>onChange(opt)} style={{padding:"4px 14px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,letterSpacing:".04em",background:val===opt?C.accent:"transparent",color:val===opt?(isDark?"#000":"#fff"):C.textMid}}>{opt}</button>
      ))}
    </div>
  );

  const Periods=()=>(
    <div style={{display:"flex",gap:2,background:isDark?"#000":C.surfaceHigh,borderRadius:7,padding:3,border:`1px solid ${C.border}`}}>
      {["Week","Month","YTD","All"].map(p=>(
        <button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:500,background:period===p?C.accent:"transparent",color:period===p?(isDark?"#000":"#fff"):C.textMid}}>{p}</button>
      ))}
    </div>
  );

  const Stat=({label,value,color,sub,size="md"})=>{
    const fs=size==="xl"?42:size==="lg"?28:20;
    return(
      <Card>
        <span className="lbl">{label}</span>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:fs,color:color||C.text,lineHeight:1.05,marginTop:2}}>{value}</div>
        {sub&&<div style={{fontSize:10,color:C.textDim,fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{sub}</div>}
      </Card>
    );
  };

  const Chk=({label,checked,onChange,stars,highlight})=>{
    const col=highlight||C.accent;
    return(
      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:checked?col:C.textDim,padding:"5px 9px",border:`1px solid ${checked?col:C.border}`,borderRadius:6,background:checked?`${col}18`:"transparent",transition:"all .15s",userSelect:"none"}}>
        <div onClick={onChange} style={{width:13,height:13,border:`1.5px solid ${checked?col:C.border}`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {checked&&<svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke={col} strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>}
        </div>
        <span style={{flex:1}}>{label}</span>
        {stars&&<span style={{fontSize:8,color:checked?col:C.textDim}}>{[...Array(Math.min(stars,3))].map(()=>"★").join("")}{stars>3?"+":""}</span>}
      </label>
    );
  };

  const Tog=({label,checked,onChange})=>(
    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
      <div onClick={onChange} style={{width:34,height:18,borderRadius:9,background:checked?C.accentDim:C.border,position:"relative",transition:"background .2s",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:checked?18:2,width:14,height:14,borderRadius:7,background:checked?C.accent:C.textDim,transition:"left .2s"}}/>
      </div>
      <span style={{fontSize:12,color:checked?C.accent:C.textDim}}>{label}</span>
    </label>
  );

  // ── Dashboard panels ──
  const EquityCurve=({data})=>{
    const sorted=[...data].filter(t=>t.trade_taken).sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length)return<Card style={{height:100,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:C.textDim,fontSize:12}}>No executed trades yet</span></Card>;
    let cum=0;
    const pts=sorted.map(t=>{cum+=parseFloat(t.r_result||0);return+cum.toFixed(2);});
    const W=600,H=80,p=8;
    const mn=Math.min(0,...pts),mx=Math.max(0,...pts),rng=mx-mn||1;
    const x=i=>p+(i/Math.max(pts.length-1,1))*(W-p*2);
    const y=v=>H-p-((v-mn)/rng)*(H-p*2);
    const zy=y(0);
    const path=pts.map((v,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    const fill=`${path} L${x(pts.length-1).toFixed(1)},${zy} L${p},${zy} Z`;
    const last=pts[pts.length-1];
    const lc=last>=0?C.green:C.red;
    return(
      <Card>
        <span className="lbl">Equity Curve</span>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:80,marginTop:6}}>
          <line x1={p} y1={zy} x2={W-p} y2={zy} stroke={C.border} strokeWidth={1} strokeDasharray="4 3"/>
          <path d={fill} fill={last>=0?"rgba(61,214,140,0.06)":"rgba(240,100,100,0.06)"}/>
          <path d={path} fill="none" stroke={lc} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
          <circle cx={x(pts.length-1)} cy={y(last)} r={3.5} fill={lc}/>
        </svg>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
          <span style={{fontSize:9,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{sorted[0]?.date}</span>
          <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:lc}}>{last>0?"+":""}{last}R</span>
          <span style={{fontSize:9,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{sorted[sorted.length-1]?.date}</span>
        </div>
      </Card>
    );
  };

  const DrawdownPanel=({m})=>(
    <Card>
      <span className="lbl">Risk Metrics</span>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.textMid}}>Max Drawdown</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.red}}>-{m.maxDrawdown}R</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.textMid}}>Current Streak</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:m.curStreakType==="W"?C.green:m.curStreakType==="L"?C.red:C.textDim}}>
            {m.curStreak}{m.curStreakType?` ${m.curStreakType}`:""}
          </span>
        </div>

  const [reviewWeek,setReviewWeek]=useState(getWeekKey(today()));
  const WeeklyReview=()=>{
    const [wNotes,setWNotes]=useState("");
    const [wMood,setWMood]=useState(0);
    const wNotesKey=`nv_wnotes_${reviewWeek}`;
    const wMoodKey=`nv_wmood_${reviewWeek}`;
    useEffect(()=>{
      setWNotes(localStorage.getItem(wNotesKey)||"");
      setWMood(parseInt(localStorage.getItem(wMoodKey)||"0"));
    },[reviewWeek]);
    const saveNotes=()=>localStorage.setItem(wNotesKey,wNotes);
    const saveMood=(m)=>{setWMood(m);localStorage.setItem(wMoodKey,String(m));};

    // Build sorted list of all weeks that have trades
    const allWeeks=[...new Set(trades.map(t=>getWeekKey(t.date)))].sort((a,b)=>b.localeCompare(a));
    const curIdx=allWeeks.indexOf(reviewWeek);
    const canPrev=curIdx<allWeeks.length-1;
    const canNext=curIdx>0;

    // Previous week for comparison
    const prevWeek=allWeeks[curIdx+1]||null;
    const prevTrades=prevWeek?trades.filter(t=>getWeekKey(t.date)===prevWeek):[];
    const prevTaken=prevTrades.filter(t=>t.trade_taken);
    const prevM=calcMetrics(prevTaken);

    const wTrades=trades.filter(t=>getWeekKey(t.date)===reviewWeek);
    const wDays=days.filter(d=>getWeekKey(d.date)===reviewWeek);
    const wWithGrade=wTrades.map(t=>({...t,_grade:t.grade||calcGrade(t).grade}));
    const aPlus=wWithGrade.filter(t=>t._grade==="A+");
    const aGrade=wWithGrade.filter(t=>t._grade==="A");
    const bGrade=wWithGrade.filter(t=>t._grade==="B");
    const validSetups=[...aPlus,...aGrade];
    const taken=wWithGrade.filter(t=>t.trade_taken);
    const takenValid=validSetups.filter(t=>t.trade_taken);
    const missed=validSetups.filter(t=>!t.trade_taken);
    const ruleBreaks=bGrade.filter(t=>t.trade_taken);
    const hesitations=taken.filter(t=>t.hesitation);
    const utilRate=validSetups.length?Math.round((takenValid.length/validSetups.length)*100):0;
    const takenM=calcMetrics(taken);
    const estMissedR=missed.reduce((s,t)=>s+(t.r_result?parseFloat(t.r_result):0),0);
    const potentialR=+(takenM.totalR+estMissedR).toFixed(2);
    const wDaysValid=wDays.filter(d=>d.outcome!=="Trash Day");
    const biasAcc=wDaysValid.length?Math.round((wDays.filter(d=>d.outcome==="Correct").length/wDaysValid.length)*100):0;
    const gc=utilRate>=80?C.green:utilRate>=50?C.yellow:C.red;

    // Session breakdown
    const sessBkd=["7AM","11AM","3PM"].map(s=>{
      const st=taken.filter(t=>t.session===s);
      const m=calcMetrics(st);
      return{s,trades:st.length,r:m.totalR,wr:m.winRate};
    });
    const bestSess=sessBkd.filter(s=>s.trades>0).sort((a,b)=>b.r-a.r)[0];

    // Streak at end of week
    const sortedTaken=[...taken].sort((a,b)=>a.date.localeCompare(b.date));
    let streak=0,streakType="";
    for(let i=sortedTaken.length-1;i>=0;i--){
      const r=parseFloat(sortedTaken[i].r_result||0);
      if(r>0&&(streakType===""||streakType==="W")){streak++;streakType="W";}
      else if(r<0&&(streakType===""||streakType==="L")){streak++;streakType="L";}
      else break;
    }

    // Rule-based summary headline
    const genHeadline=()=>{
      if(!taken.length) return "No trades taken this week.";
      const rSign=takenM.totalR>0?"+":"";
      const perfWord=takenM.totalR>=3?"Strong week":takenM.totalR>=1?"Positive week":takenM.totalR===0?"Breakeven week":"Losing week";
      const execWord=utilRate>=80?"full execution":utilRate>=50?"partial execution":"low execution";
      const biasWord=biasAcc>=70?"sharp bias":biasAcc>=50?"decent bias":"weak bias";
      const streakWord=streak>1?(streakType==="W"?` Riding ${streak}-trade win streak.`:` On ${streak}-trade loss streak.`):"";
      return `${perfWord} — ${takenValid.length}/${validSetups.length} A/A+ taken (${execWord}), ${rSign}${takenM.totalR}R, bias ${biasAcc}% accurate.${streakWord}`;
    };
    return(
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {/* Nav */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <Sect style={{margin:0}}>Weekly Review</Sect>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>canPrev&&setReviewWeek(allWeeks[curIdx+1])} disabled={!canPrev}
              style={{padding:"4px 12px",background:"transparent",border:`1px solid ${canPrev?C.border:C.border+"44"}`,borderRadius:5,color:canPrev?C.textMid:C.textDim,cursor:canPrev?"pointer":"default",fontSize:14}}>←</button>
            <select value={reviewWeek} onChange={e=>setReviewWeek(e.target.value)}
              style={{background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:5,padding:"4px 12px",color:C.text,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>
              <option value={getWeekKey(today())}>This Week ({getWeekKey(today())})</option>
              {allWeeks.filter(w=>w!==getWeekKey(today())).map(w=><option key={w} value={w}>{w}</option>)}
            </select>
            <button onClick={()=>canNext&&setReviewWeek(allWeeks[curIdx-1])} disabled={!canNext}
              style={{padding:"4px 12px",background:"transparent",border:`1px solid ${canNext?C.border:C.border+"44"}`,borderRadius:5,color:canNext?C.textMid:C.textDim,cursor:canNext?"pointer":"default",fontSize:14}}>→</button>
          </div>
        </div>

        {wTrades.length===0?(
          <Card><div style={{textAlign:"center",padding:"32px 0",color:C.textDim,fontSize:12}}>No setups logged this week yet</div></Card>
        ):(
          <>
            {/* ── HEADLINE SUMMARY ── */}
            <div style={{padding:"14px 18px",background:isDark?"#050505":C.surfaceHigh,borderRadius:10,border:`1px solid ${takenM.totalR>0?C.green:takenM.totalR<0?C.red:C.border}`,display:"flex",alignItems:"flex-start",gap:14}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:42,color:takenM.totalR>0?C.green:takenM.totalR<0?C.red:C.textMid,lineHeight:1,flexShrink:0}}>
                {takenM.totalR>0?"+":""}{ takenM.totalR}R
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:C.text,fontWeight:600,marginBottom:4,lineHeight:1.4}}>{genHeadline()}</div>
                {prevWeek&&<div style={{fontSize:10,color:C.textDim}}>vs prev week: <span style={{color:prevM.totalR>=0?C.green:C.red}}>{prevM.totalR>0?"+":""}{prevM.totalR}R</span> · <span style={{color:C.textDim}}>{prevM.winRate}% win</span></div>}
                {streak>1&&<div style={{fontSize:10,marginTop:3,color:streakType==="W"?C.green:C.red}}>{streakType==="W"?"🔥":"📉"} {streak}-trade {streakType==="W"?"win":"loss"} streak entering next week</div>}
              </div>
            </div>

            {/* ── SYSTEM UTILISATION ── */}
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <span className="lbl" style={{margin:0}}>System Utilisation</span>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:gc}}>{utilRate}%</span>
              </div>
              <div style={{height:5,background:isDark?"#000":C.surfaceHigh,borderRadius:3,overflow:"hidden",marginBottom:12}}>
                <div style={{height:"100%",width:`${utilRate}%`,background:gc,borderRadius:3,transition:"width .5s"}}/>
              </div>
              {/* Grade ratio bar */}
              {wWithGrade.length>0&&(
                <div style={{height:4,display:"flex",borderRadius:3,overflow:"hidden",marginBottom:12,gap:1}}>
                  {aPlus.length>0&&<div style={{flex:aPlus.length,background:C.gradeAp}}/>}
                  {aGrade.length>0&&<div style={{flex:aGrade.length,background:C.gradeA}}/>}
                  {bGrade.length>0&&<div style={{flex:bGrade.length,background:C.gradeB}}/>}
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}}>
                {[["All Setups",wTrades.length,C.text],["A+ / A",validSetups.length,C.accent],["Taken",takenValid.length,C.green],["Missed",missed.length,C.yellow],["Rule Breaks",ruleBreaks.length,ruleBreaks.length===0?C.green:C.red]].map(([l,v,col])=>(
                  <div key={l} style={{textAlign:"center",background:isDark?"#000":C.surfaceHigh,borderRadius:7,padding:"8px 4px",border:`1px solid ${C.border}`}}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:col}}>{v}</div>
                    <div style={{fontSize:9,color:C.textDim,letterSpacing:".05em"}}>{l}</div>
                  </div>
                ))}
              </div>
            </Card>

            {/* ── GRADE BREAKDOWN ── */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
              {[{g:"A+",all:aPlus,color:C.gradeAp},{g:"A",all:aGrade,color:C.gradeA},{g:"B",all:bGrade,color:C.gradeB}].map(({g,all,color})=>{
                const tk=all.filter(t=>t.trade_taken);
                const ms=all.filter(t=>!t.trade_taken);
                const m=calcMetrics(tk);
                return(
                  <Card key={g}>
                    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:32,color,marginBottom:8}}>{g}</div>
                    {[["Logged",all.length,C.text],["Taken",tk.length,C.green],[g==="B"?"Correct Skip":"Missed",ms.length,g==="B"?C.green:C.yellow],["Total R",`${m.totalR>0?"+":""}${m.totalR}R`,m.totalR>=0?C.green:C.red],["Win%",`${m.winRate}%`,C.accent]].map(([l,v,col])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:3,paddingBottom:3,borderBottom:`1px solid ${C.border}`}}>
                        <span style={{fontSize:10,color:C.textMid}}>{l}</span>
                        <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:col}}>{v}</span>
                      </div>
                    ))}
                  </Card>
                );
              })}
            </div>

            {/* ── R PERFORMANCE + STREAK ── */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              {[["R Made",`${takenM.totalR>0?"+":""}${takenM.totalR}R`,takenM.totalR>=0?C.green:C.red],["System Potential",`~${potentialR>0?"+":""}${potentialR}R`,C.accent],["Left on Table",`~${estMissedR.toFixed(1)}R`,C.yellow],["End Streak",streak>0?`${streak}${streakType}`:"—",streak>0?(streakType==="W"?C.green:C.red):C.textDim]].map(([l,v,col])=>(
                <Card key={l} style={{textAlign:"center"}}>
                  <span className="lbl">{l}</span>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:26,color:col,marginTop:2}}>{v}</div>
                </Card>
              ))}
            </div>

            {/* ── SESSION + PSYCHOLOGY + BIAS ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
              <Card>
                <span className="lbl">Session Breakdown</span>
                {sessBkd.map(({s,trades:t,r,wr})=>(
                  <div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,paddingBottom:5,borderBottom:`1px solid ${C.border}`}}>
                    <span style={{fontSize:11,color:s===bestSess?.s?C.accent:C.textMid,fontWeight:s===bestSess?.s?700:400}}>{s}{s===bestSess?.s?" ★":""}</span>
                    <span style={{fontSize:10,color:C.textDim}}>{t}T</span>
                    <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:r>0?C.green:r<0?C.red:C.textDim}}>{r>0?"+":""}{r}R</span>
                    <span style={{fontSize:10,color:C.textDim}}>{t>0?`${wr}%`:"—"}</span>
                  </div>
                ))}
              </Card>
              <Card>
                <span className="lbl">Psychology</span>
                {[["Rule Breaks",ruleBreaks.length,ruleBreaks.length===0?C.green:C.red],["Hesitations",hesitations.length,hesitations.length===0?C.green:C.yellow],["Win Rate",`${takenM.winRate}%`,takenM.winRate>=50?C.green:C.red],["Expectancy",`${takenM.expectancy}R`,takenM.expectancy>=0?C.green:C.red],["Profit Factor",takenM.profitFactor,takenM.profitFactor>=1.5?C.green:takenM.profitFactor>=1?C.yellow:C.red]].map(([l,v,col])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:4,paddingBottom:4,borderBottom:`1px solid ${C.border}`}}>
                    <span style={{fontSize:11,color:C.textMid}}>{l}</span>
                    <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:col}}>{v}</span>
                  </div>
                ))}
              </Card>
              <Card>
                <span className="lbl">Bias Engine</span>
                {[["Days Logged",wDays.length,C.textMid],["Correct",wDays.filter(d=>d.outcome==="Correct").length,C.green],["Wrong",wDays.filter(d=>d.outcome==="Wrong").length,C.red],["Trash Days",wDays.filter(d=>d.outcome==="Trash Day").length,C.textDim],["Accuracy",`${biasAcc}%`,biasAcc>=60?C.green:biasAcc>=40?C.yellow:C.red]].map(([l,v,col])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",marginBottom:4,paddingBottom:4,borderBottom:`1px solid ${C.border}`}}>
                    <span style={{fontSize:11,color:C.textMid}}>{l}</span>
                    <span style={{fontSize:12,fontFamily:"'JetBrains Mono',monospace",color:col}}>{v}</span>
                  </div>
                ))}
              </Card>
            </div>

            {/* ── MINDSET RATING + WEEKLY NOTES ── */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:10}}>
              <Card>
                <span className="lbl">Mindset Rating</span>
                <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"center"}}>
                  {[1,2,3,4,5].map(n=>(
                    <button key={n} onClick={()=>saveMood(n)}
                      style={{width:36,height:36,borderRadius:"50%",border:`2px solid ${wMood>=n?C.accent:C.border}`,background:wMood>=n?C.accentGlow:"transparent",color:wMood>=n?C.accent:C.textDim,fontSize:14,cursor:"pointer",fontWeight:700}}>
                      {n}
                    </button>
                  ))}
                </div>
                <div style={{textAlign:"center",fontSize:10,color:C.textDim,marginTop:6}}>
                  {wMood===0?"Not rated":wMood<=2?"Struggling":wMood===3?"Neutral":wMood===4?"Good":"Peak"}
                </div>
              </Card>
              <Card>
                <span className="lbl">Weekly Notes</span>
                <textarea value={wNotes} onChange={e=>setWNotes(e.target.value)} onBlur={saveNotes}
                  placeholder="What worked? What didn't? Key lessons this week..."
                  rows={4} style={{width:"100%",background:C.inputBg,border:`1px solid ${C.border}`,borderRadius:6,padding:"8px 10px",color:C.text,fontSize:11,resize:"vertical",boxSizing:"border-box",lineHeight:1.5,marginTop:6}}/>
              </Card>
            </div>

            {/* ── ALL SETUPS THIS WEEK ── */}
            <Card>
              <span className="lbl" style={{marginBottom:10}}>All Setups This Week</span>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {[...wWithGrade].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
                  const r=parseFloat(t.r_result||0);
                  const tGrade=t._grade||t.grade||calcGrade(t).grade;
                  const tgc=tGrade==="A+"?C.gradeAp:tGrade==="A"?C.gradeA:C.gradeB;
                  return(
                    <div key={t.id} onClick={()=>setDetailTrade(t)} style={{display:"grid",gridTemplateColumns:"90px 70px 50px 50px 50px 60px 1fr 26px",gap:6,padding:"8px 12px",background:isDark?"#000":C.surfaceHigh,borderRadius:7,border:`1px solid ${t.trade_taken?(r>0?C.green+"44":r<0?C.red+"44":C.border):C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",alignItems:"center",cursor:"pointer"}}>
                      <span style={{color:C.textMid}}>{t.date}</span>
                      <span style={{color:C.text}}>{t.pair}</span>
                      <span style={{color:C.textDim}}>{t.session}</span>
                      <span style={{color:t.direction==="Long"?C.green:C.red}}>{t.direction}</span>
                      <span style={{color:tgc,fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{tGrade}</span>
                      <span style={{color:t.trade_taken?(r>0?C.green:r<0?C.red:C.textDim):C.textDim}}>{t.trade_taken?`${r>0?"+":""}${r}R`:"—"}</span>
                      <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.notes||t.no_trade_reason||""}</span>
                      <span style={{fontSize:10,color:C.blue}}>→</span>
                    </div>
                  );
                })}
              </div>
            </Card>
          </>
        )}
      </div>
    );
  };

  // ── Trade row ──
  const TradeRow=({t,showSelect=true})=>{
    const r=parseFloat(t.r_result||0);
    const gc=t.grade==="A+"?C.gradeAp:t.grade==="A"?C.gradeA:C.gradeB;
    const isRuleBreak=t.grade==="B"&&t.trade_taken;
    const isSel=selected.has(t.id);
    const confsActive=ALL_CONFS.filter(c=>t[c.key]).map(c=>c.label.split(" ").pop()).join(" ");
    return(
      <div style={{display:"grid",gridTemplateColumns:`${showSelect?"24px ":""}88px 70px 46px 46px 60px 56px 70px 56px 28px 1fr 26px`,gap:5,padding:"7px 10px",background:isSel?(isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)"):C.surface,borderRadius:7,border:`1px solid ${isSel?C.accent:isRuleBreak?C.red:C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",alignItems:"center",boxShadow:C.shadow,cursor:"pointer"}} onClick={()=>setDetailTrade(t)}>
        {showSelect&&<div onClick={e=>e.stopPropagation()} style={{display:"flex",alignItems:"center"}}><input type="checkbox" checked={isSel} onChange={()=>togSelect(t.id)} style={{width:16,height:16,cursor:"pointer",accentColor:C.accent,flexShrink:0}}/></div>}
        <span style={{color:C.textMid}}>{t.date}</span>
        <span style={{color:C.text}}>{t.pair}</span>
        <span style={{color:C.textDim}}>{t.session}</span>
        <span style={{color:t.direction==="Long"?C.green:C.red}}>{t.direction}</span>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <span style={{color:gc,fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{t.grade}</span>
          {isRuleBreak&&<span style={{fontSize:8,color:C.red}}>⚠</span>}
        </div>
        <span style={{color:t.trade_taken?(r>0?C.green:r<0?C.red:C.textDim):C.textDim}}>{t.trade_taken?`${r>0?"+":""}${r}R`:"—"}</span>
        <span style={{fontSize:9,color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{confsActive}</span>
        <span style={{fontSize:9,color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.key_zone}</span>
        <span onClick={e=>e.stopPropagation()}>{t.chart_link?<a href={t.chart_link} target="_blank" rel="noopener noreferrer" style={{color:C.blue,textDecoration:"none",fontSize:12}}>↗</a>:<span style={{color:C.textDim}}>—</span>}</span>
        <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.notes}</span>
        <button onClick={e=>{e.stopPropagation();sbDel("trades",t.id);setTrades(p=>p.filter(x=>x.id!==t.id));setSelected(s=>{const n=new Set(s);n.delete(t.id);return n;});}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"1px 5px",fontSize:9}}>✕</button>
      </div>
    );
  };

  return(
    <>
      <style>{CSS}</style>
      <div style={{minHeight:"100vh",background:C.bg}}>

        {/* NAV */}
        <div style={{borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px",height:52,position:"sticky",top:0,background:C.surface,zIndex:150,boxShadow:C.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <NVLogo size={32} isDark={isDark} onClick={()=>switchTab("Dashboard")}/>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:C.textMid,letterSpacing:".18em"}}>JOURNAL</span>
          </div>
          <nav style={{display:"flex",gap:2}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>switchTab(t)} style={{padding:"5px 14px",border:"none",borderRadius:5,fontSize:11,letterSpacing:".06em",fontWeight:500,background:tab===t?C.accentGlow:"transparent",color:tab===t?C.accent:C.textMid,borderBottom:tab===t?`1.5px solid ${C.accent}`:"1.5px solid transparent"}}>{t}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <><span style={{fontSize:10,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{today()}</span>{syncing&&<span style={{fontSize:9,color:C.textDim,marginLeft:8}}>⟳ syncing</span>}</>
            <button onClick={()=>setIsDark(d=>!d)} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 11px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:20,color:C.textMid,fontSize:11}}>
              <span>{isDark?"☀️":"🌙"}</span><span>{isDark?"Light":"Dark"}</span>
            </button>
            <button onClick={clearAll} style={{padding:"4px 11px",background:"transparent",border:`1px solid ${C.red}`,borderRadius:20,color:C.red,fontSize:11}}>🗑 Clear All</button>
          </div>
        </div>

        <div style={{maxWidth:1160,margin:"0 auto",padding:"18px 16px"}}>

          {/* ══ DASHBOARD ══ */}
          {tab==="Dashboard"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Sect>Performance Overview</Sect>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <Toggle2 val={dashView} a="Live" b="All" onChange={setDashView}/>
                  <Periods/>
                </div>
              </div>
              <PeriodStrip allTrades={trades}/>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <Stat label="Total Trades" value={metrics.total} color={C.accent} size="lg"/>
                <Stat label="Total R" value={`${metrics.totalR>0?"+":""}${metrics.totalR}R`} color={metrics.totalR>0?C.green:metrics.totalR<0?C.red:C.text} size="xl"/>
                <Stat label="Win Rate" value={`${metrics.winRate}%`} color={metrics.winRate>=50?C.green:C.red} size="lg"/>
                <Stat label="Expectancy" value={`${metrics.expectancy}R`} color={metrics.expectancy>0?C.green:metrics.expectancy<0?C.red:C.text} size="lg"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <Stat label="Profit Factor" value={metrics.profitFactor} color={C.accent} sub={`${metrics.wins}W · ${metrics.losses}L · ${metrics.be}BE`}/>
                <Stat label="Avg Win" value={`+${metrics.avgWin}R`} color={C.green}/>
                <Stat label="Avg Loss" value={`-${metrics.avgLoss}R`} color={C.red}/>
                <Stat label="Avg RR" value={metrics.avgLoss>0?`${(metrics.avgWin/metrics.avgLoss).toFixed(2)}:1`:"—"} color={C.accent}/>
              </div>
              <EquityCurve data={dashFiltered}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <SessionPanel data={dashFiltered} isLive={dashView==="Live"}/>
                <DrawdownPanel m={metrics}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <GradePanel data={dashFiltered} isLive={dashView==="Live"}/>
                <BestWorstPanel m={metrics} onClick={setDetailTrade}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <DisciplinePanel data={dashFiltered} allData={dashSource}/>
                <OpportunityPanel data={dashFiltered}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <PairStats data={dashFiltered}/>
                <DirectionStats data={dashFiltered}/>
              </div>
              <PairSessionMatrix data={dashFiltered}/>
              <BiasEngine/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <ConfluenceStats data={dashFiltered}/>
                <CandleStats data={dashFiltered}/>
              </div>
            </div>
          )}

          {/* ══ TRADES ══ */}
          {tab==="Trades"&&(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

        <>
          <div onClick={()=>setDetailTrade(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:190}}/>
          <TradeDetail trade={detailTrade} C={C} isDark={isDark} onClose={()=>setDetailTrade(null)}
            onSave={updated=>{sbSave("trades",updated);setTrades(p=>p.map(t=>t.id===updated.id?updated:t));setDetailTrade(updated);}}/>
        </>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<NVJournal/>);
  </script>
</body>
</html>
