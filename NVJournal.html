// ─── GRADE ENGINE ─────────────────────────────────────────────────────────────
function calcGradeSimple(t){const g=t.grade||calcGrade(t).grade;return g==="A+"?3:g==="A"?2:1;}
function calcGrade(s){
  let pts=0; const reasons=[];
  const allAl=s.daily_bias!=="Neutral"&&s.daily_bias===s.h4_bias&&s.h4_bias===s.h1_bias;
  const partAl=s.h4_bias!=="Neutral"&&s.h4_bias===s.h1_bias;
  if(allAl){pts+=3;reasons.push({label:"HTF Alignment",pts:3,met:true});}
  else if(partAl){pts+=1;reasons.push({label:"HTF Alignment",pts:1,met:true,note:"H4+H1"});}
  else{reasons.push({label:"HTF Alignment",pts:0,met:false});}
  const cs={C2:3,C3:3,C4:1,"C5+":0};
  const best=Math.max(cs[s.daily_candle]||0,cs[s.h4_candle]||0,cs[s.h1_candle]||0);
  const allC5=[s.daily_candle,s.h4_candle,s.h1_candle].every(c=>c==="C5+");
  if(allC5){reasons.push({label:"Candle Position",pts:0,met:false,note:"All C5+"});}
  else if(best>=3){pts+=3;reasons.push({label:"Candle Position",pts:3,met:true});}
  else{pts+=1;reasons.push({label:"Candle Position",pts:1,met:true,note:"Late"});}
  if(s.sweep_h4&&s.sweep_h1){pts+=6;reasons.push({label:"Sweep H4+H1",pts:6,met:true,note:"Both"});}
  else if(s.sweep_h4){pts+=3;reasons.push({label:"Sweep H4",pts:3,met:true});}
  else if(s.sweep_h1){pts+=3;reasons.push({label:"Sweep H1",pts:3,met:true});}
  else{reasons.push({label:"Sweep",pts:0,met:false});}
  if(s.cisd_h1&&s.ltf_5m_cisd){pts+=4;reasons.push({label:"CISD H1+5M",pts:4,met:true});}
  else if(s.cisd_h1){pts+=3;reasons.push({label:"CISD H1",pts:3,met:true});}
  else if(s.cisd_h4){pts+=2;reasons.push({label:"CISD H4",pts:2,met:true});}
  else if(s.ltf_5m_cisd){pts+=1;reasons.push({label:"5M CISD",pts:1,met:true,note:"Weak"});}
  else{reasons.push({label:"CISD",pts:0,met:false});}
  if(s.key_zone&&s.key_zone!=="None"){pts+=2;reasons.push({label:"Key Zone",pts:2,met:true});}
  else{reasons.push({label:"Key Zone",pts:0,met:false});}
  const corr=[s.smt,s.psp,s.gu_confirm].filter(Boolean).length;
  if(corr>=2){pts+=2;reasons.push({label:"SMT/PSP/GU",pts:2,met:true,note:`${corr}`});}
  else if(corr){pts+=1;reasons.push({label:"SMT/PSP/GU",pts:1,met:true});}
  else{reasons.push({label:"SMT/PSP/GU",pts:0,met:false});}
  const htfc=[s.htf_daily,s.htf_h4,s.htf_h1].filter(Boolean).length;
  if(htfc>=2){pts+=2;reasons.push({label:"HTF Structure",pts:2,met:true});}
  else if(htfc){pts+=1;reasons.push({label:"HTF Structure",pts:1,met:true});}
  else{reasons.push({label:"HTF Structure",pts:0,met:false});}
  if(s.displacement){pts+=1;reasons.push({label:"Displacement",pts:1,met:true});}
  if(s.discount_prem){pts+=1;reasons.push({label:"Disc/Premium",pts:1,met:true});}
  const maxPts=24;
  const score=Math.round((pts/maxPts)*9);
  let grade,tradeable;
  if(score>=7){grade="A+";tradeable=true;}
  else if(score>=5){grade="A";tradeable=true;}
  else{grade="B";tradeable=false;}
  return{grade,pts,score,maxPts,tradeable,reasons};
}

// ─── METRICS ──────────────────────────────────────────────────────────────────
function calcMetrics(trades, onlyTaken=true){
  const ex=onlyTaken?trades.filter(t=>t.trade_taken):trades.filter(t=>t.trade_taken||parseFloat(t.r_result||0)!==0);
  if(!ex.length)return{total:0,totalR:0,winRate:0,expectancy:0,profitFactor:0,posR:0,negR:0,wins:0,losses:0,be:0,avgWin:0,avgLoss:0,maxWinStreak:0,maxLossStreak:0,curStreak:0,curStreakType:"",maxDrawdown:0,bestTrade:null,worstTrade:null};
  const rr=ex.map(t=>parseFloat(t.r_result||0));
  const totalR=+rr.reduce((s,r)=>s+r,0).toFixed(2);
  const wa=rr.filter(r=>r>0),la=rr.filter(r=>r<0);
  const posR=+wa.reduce((s,r)=>s+r,0).toFixed(2);
  const negR=+Math.abs(la.reduce((s,r)=>s+r,0)).toFixed(2);
  const wins=wa.length,losses=la.length,total=ex.length;
  // streaks
  let mxW=0,mxL=0,cW=0,cL=0;
  rr.forEach(r=>{if(r>0){cW++;cL=0;mxW=Math.max(mxW,cW);}else if(r<0){cL++;cW=0;mxL=Math.max(mxL,cL);}else{cW=0;cL=0;}});
  let curStreak=0,curStreakType="";
  for(let i=rr.length-1;i>=0;i--){
    if(rr[i]>0&&(curStreakType===""||curStreakType==="W")){curStreak++;curStreakType="W";}
    else if(rr[i]<0&&(curStreakType===""||curStreakType==="L")){curStreak++;curStreakType="L";}
    else break;
  }
  // drawdown
  let peak=0,maxDD=0,cum=0;
  rr.forEach(r=>{cum+=r;if(cum>peak)peak=cum;const dd=peak-cum;if(dd>maxDD)maxDD=dd;});
  // best/worst
  // Best = highest R winner, tiebreak by grade. Worst = biggest loss only.
  const winners=ex.filter(t=>parseFloat(t.r_result||0)>0);
  const losers=ex.filter(t=>parseFloat(t.r_result||0)<0);
  const gradeVal=g=>g==="A+"?3:g==="A"?2:1;
  const bestTrade=winners.length?winners.reduce((b,t)=>{const br=parseFloat(b.r_result),tr=parseFloat(t.r_result);return tr>br||(tr===br&&gradeVal(t.grade||"B")>gradeVal(b.grade||"B"))?t:b}):null;
  const worstTrade=losers.length?losers.reduce((b,t)=>parseFloat(t.r_result)<parseFloat(b.r_result)?t:b):null;
  return{
    total,totalR,wins,losses,be:total-wins-losses,
    winRate:+(wins/total*100).toFixed(1),
    expectancy:+(totalR/total).toFixed(2),
    profitFactor:negR===0?posR:+(posR/negR).toFixed(2),
    posR,negR,
    avgWin:wins?+(posR/wins).toFixed(2):0,
    avgLoss:losses?+(negR/losses).toFixed(2):0,
    maxWinStreak:mxW,maxLossStreak:mxL,
    curStreak,curStreakType,
    maxDrawdown:+maxDD.toFixed(2),
    bestTrade,worstTrade,
  };
}

const today=()=>new Date().toISOString().split("T")[0];
function getWeekKey(d){
  const date=new Date(d),day=date.getDay();
  const diff=date.getDate()-day+(day===0?-6:1);
  return new Date(date.setDate(diff)).toISOString().split("T")[0];
}
function filterByPeriod(trades,period){
  const now=today();
  if(period==="Week") return trades.filter(t=>getWeekKey(t.date)===getWeekKey(now));
  if(period==="Month")return trades.filter(t=>t.date.slice(0,7)===now.slice(0,7));
  if(period==="YTD")  return trades.filter(t=>t.date.slice(0,4)===now.slice(0,4));
  return trades;
}

function PositionCalc({C,isDark}){
  const [acct,setAcct]=useState(10000);

  const [stopTicks,setStopTicks]=useState(10);
  const [selected,setSelected]=useState(["6E","M6E","6B","M6B","ES","MES","NQ","MNQ"]);

  const riskDollar=+(acct*(riskPct/100)).toFixed(2);
  const toggle=sym=>setSelected(s=>s.includes(sym)?s.filter(x=>x!==sym):[...s,sym]);

  const results=FUTURES_ASSETS.filter(a=>selected.includes(a.sym)).map(a=>{
    const riskPerContract=stopTicks*a.tickVal;
    const contracts=riskPerContract>0?Math.floor(riskDollar/riskPerContract):0;

            <span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Risk % per Trade</span>
            <input style={inp} type="number" value={riskPct} onChange={e=>setRiskPct(+e.target.value)} step="0.5" min="0.1" max="10"/>
          </div>
          <div>
            <span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>Stop Loss (Ticks)</span>

        </div>
        <div style={{padding:"10px 14px",background:isDark?"#000":"#f5f5f5",borderRadius:7,display:"flex",gap:20,flexWrap:"wrap"}}>
          <div><span style={{fontSize:9,color:C.textDim,textTransform:"uppercase",letterSpacing:".1em"}}>Risk $</span><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:C.red}}>${riskDollar.toLocaleString()}</div></div>

const DONUT_COLORS = ["#00d4aa","#3b8bff","#f59e0b","#ef4444","#8b5cf6","#ec4899","#10b981","#f97316"];

function DonutChart({slices, C, isDark}){
  const total = slices.reduce((s,x)=>s+x.val,0);
  if(!total) return null;
  let cumAngle = -90;
  const R=70, cx=90, cy=90, gap=2;
  const paths = slices.map((s,i)=>{
    const pct = s.val/total;
    const angle = pct*360 - gap;
    const start = cumAngle;
    cumAngle += pct*360;
    const r1=start*(Math.PI/180), r2=(start+angle)*(Math.PI/180);
    const x1=cx+R*Math.cos(r1), y1=cy+R*Math.sin(r1);
    const x2=cx+R*Math.cos(r2), y2=cy+R*Math.sin(r2);
    const lg = angle>180?1:0;
    return {path:`M ${cx} ${cy} L ${x1} ${y1} A ${R} ${R} 0 ${lg} 1 ${x2} ${y2} Z`, color:DONUT_COLORS[i%DONUT_COLORS.length], label:s.sym, pct:(pct*100).toFixed(1)};
  });
  return(
    <div style={{display:"flex",alignItems:"center",gap:20}}>
      <svg width={180} height={180} viewBox="0 0 180 180">
        <circle cx={cx} cy={cy} r={42} fill={isDark?"#0d0d0d":C.surface}/>
        {paths.map((p,i)=><path key={i} d={p.path} fill={p.color} opacity={0.9}/>)}
      </svg>
      <div style={{display:"flex",flexDirection:"column",gap:5}}>
        {paths.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:8,height:8,borderRadius:2,background:p.color,flexShrink:0}}/>
            <span style={{fontSize:11,color:C.text,fontFamily:"'JetBrains Mono',monospace"}}>{p.label}</span>
            <span style={{fontSize:10,color:C.textDim}}>{p.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CryptoTracker({C, isDark}){
  const [holdings, setHoldings] = useState(()=>{
    try{ const s=localStorage.getItem("nv_crypto_v2"); return s?JSON.parse(s):DEFAULT_HOLDINGS; }catch{return DEFAULT_HOLDINGS;}
  });
  const [prices, setPrices] = useState({});
  const [fetching, setFetching] = useState(false);
  const [lastFetch, setLastFetch] = useState("");
  const [editId, setEditId] = useState(null);
  const [editBuf, setEditBuf] = useState({});
  const [addRow, setAddRow] = useState(false);
  const [newH, setNewH] = useState({sym:"",units:"",avg_cost:""});

  useEffect(()=>{ try{localStorage.setItem("nv_crypto_v2",JSON.stringify(holdings));}catch{} },[holdings]);

  async function fetchPrices(){
    const ids = [...new Set(holdings.map(h=>COIN_IDS[h.sym.toUpperCase()]).filter(Boolean))];
    if(!ids.length) return;
    setFetching(true);
    try{
      const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids.join(",")}&vs_currencies=usd`);
      const data = await r.json();
      const map={};
      Object.entries(COIN_IDS).forEach(([sym,id])=>{ if(data[id]?.usd) map[sym]=data[id].usd; });
      setPrices(map);
      setLastFetch(new Date().toLocaleTimeString());
    }catch(e){ console.warn("CoinGecko failed",e); }
    setFetching(false);
  }

  useEffect(()=>{ fetchPrices(); },[]);

  function startEdit(h){ setEditId(h.id); setEditBuf({units:h.units, avg_cost:h.avg_cost}); }
  function saveEdit(id){
    setHoldings(p=>p.map(h=>h.id===id?{...h,...editBuf}:h));
    setEditId(null);
  }
  function removeH(id){ setHoldings(p=>p.filter(h=>h.id!==id)); }
  function addHolding(){
    if(!newH.sym||!newH.units) return;
    setHoldings(p=>[...p,{...newH,sym:newH.sym.toUpperCase(),id:Date.now()}]);
    setNewH({sym:"",units:"",avg_cost:""});
    setAddRow(false);
    setTimeout(fetchPrices,300);
  }

  const rows = holdings.map(h=>{
    const units=parseFloat(h.units||0);
    const avgCost=parseFloat(h.avg_cost||0);
    const price=prices[h.sym.toUpperCase()]||0;
    const invested=units*avgCost;
    const value=units*price;
    const pnl=value-invested;
    const pnlPct=invested>0?(pnl/invested*100):0;
    return{...h,units,avgCost,price,invested,value,pnl,pnlPct};
  });

  const totalInvested=rows.reduce((s,r)=>s+r.invested,0);
  const totalValue=rows.reduce((s,r)=>s+(r.price?r.value:r.invested),0);
  const totalPnl=rows.reduce((s,r)=>s+(r.price?r.pnl:0),0);
  const totalPnlPct=totalInvested>0?(totalPnl/totalInvested*100):0;
  const hasAnyPrice=rows.some(r=>r.price>0);

  const donutSlices=rows.filter(r=>r.value>0).map(r=>({sym:r.sym,val:r.value}));
  const donutSlicesInv=rows.map(r=>({sym:r.sym,val:r.invested}));

  const statStyle=(col)=>({fontFamily:"'Bebas Neue',sans-serif",fontSize:28,color:col,lineHeight:1});
  const inp={background:isDark?"#111":"#fff",color:isDark?"#fff":"#000",border:`1px solid ${isDark?"#333":"#ccc"}`,borderRadius:4,padding:"3px 7px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,width:"90px",outline:"none"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {/* ── Summary row ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[
          ["Total Invested", `$${totalInvested.toLocaleString("en",{maximumFractionDigits:0})}`, C.accent],
          ["Portfolio Value", hasAnyPrice?`$${totalValue.toLocaleString("en",{maximumFractionDigits:0})}`:"Fetching…", totalValue>=totalInvested?C.green:C.red],
          ["P&L", hasAnyPrice?`${totalPnl>=0?"+":""}$${Math.abs(totalPnl).toLocaleString("en",{maximumFractionDigits:0})}`:"—", totalPnl>=0?C.green:C.red],
          ["Return", hasAnyPrice?`${totalPnlPct>=0?"+":""}${totalPnlPct.toFixed(1)}%`:"—", totalPnlPct>=0?C.green:C.red],
        ].map(([l,v,col])=>(
          <div key={l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 18px",boxShadow:C.shadow}}>
            <span style={{fontSize:9,letterSpacing:".14em",textTransform:"uppercase",color:C.textDim,fontWeight:600,display:"block",marginBottom:4}}>{l}</span>
            <div style={statStyle(col)}>{v}</div>
          </div>
        ))}
      </div>

      {/* ── Charts + Holdings ── */}
      <div style={{display:"grid",gridTemplateColumns:"220px 1fr",gap:12}}>
        {/* Donut */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px",boxShadow:C.shadow,display:"flex",flexDirection:"column",gap:12}}>
          <span style={{fontSize:10,fontWeight:600,color:C.text,letterSpacing:".08em",textTransform:"uppercase"}}>Allocation</span>
          <DonutChart slices={hasAnyPrice?donutSlices:donutSlicesInv} C={C} isDark={isDark}/>
          {lastFetch&&<span style={{fontSize:9,color:C.textDim,marginTop:"auto"}}>Prices: {lastFetch}</span>}
        </div>

        {/* Holdings table */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",boxShadow:C.shadow}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:11,fontWeight:600,color:C.text}}>Holdings</span>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <button onClick={fetchPrices} disabled={fetching} style={{padding:"4px 12px",background:C.accentGlow,border:`1px solid ${C.border}`,borderRadius:5,color:C.accent,fontSize:11,cursor:"pointer"}}>{fetching?"…":"↻ Refresh"}</button>
              <button onClick={()=>setAddRow(r=>!r)} style={{padding:"4px 12px",background:C.accent,border:"none",borderRadius:5,color:isDark?"#000":"#fff",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add</button>

          {addRow&&(
            <div style={{display:"grid",gridTemplateColumns:"80px 120px 120px auto",gap:8,padding:"10px 16px",background:isDark?"#000":"#f9f9f9",borderBottom:`1px solid ${C.border}`,alignItems:"end"}}>
              <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>Symbol</div><input style={{...inp,width:"70px"}} placeholder="BTC" value={newH.sym} onChange={e=>setNewH(h=>({...h,sym:e.target.value.toUpperCase()}))}/></div>
              <div><div style={{fontSize:9,color:C.textDim,marginBottom:3}}>Units held</div><input style={{...inp,width:"110px"}} placeholder="0.05" value={newH.units} onChange={e=>setNewH(h=>({...h,units:e.target.value}))}/></div>

              ))}
            </tr></thead>
            <tbody>
              {rows.map((h,i)=>{
                const col=h.pnl>=0?C.green:C.red;
                const isEditing=editId===h.id;
                const totalV=hasAnyPrice?totalValue:totalInvested;
                const alloc=totalV>0?((h.price?h.value:h.invested)/totalV*100):0;
                return(
                  <tr key={h.id} style={{borderBottom:`1px solid ${C.border}`,background:isEditing?(isDark?"#0d1a0d":"#f0fff4"):i%2===0?"transparent":isDark?"rgba(255,255,255,0.015)":"rgba(0,0,0,0.01)"}}>
                    <td style={{padding:"8px 6px 8px 12px",width:28}}>

                    </td>
                    <td style={{padding:"8px 10px"}}>
                      {isEditing?<input style={inp} value={editBuf.avg_cost} onChange={e=>setEditBuf(b=>({...b,avg_cost:e.target.value}))}/>
                        :<span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMid}}>${parseFloat(h.avg_cost||0).toLocaleString("en",{maximumFractionDigits:4})}</span>}
                    </td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMid}}>${h.invested.toLocaleString("en",{maximumFractionDigits:2})}</td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:h.price?C.text:C.textDim}}>{h.price?`$${h.price.toLocaleString("en",{maximumFractionDigits:4})}`:"—"}</td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:h.price?C.text:C.textDim}}>{h.price?`$${h.value.toLocaleString("en",{maximumFractionDigits:2})}`:"—"}</td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:h.price?col:C.textDim}}>{h.price?`${h.pnl>=0?"+":""}$${Math.abs(h.pnl).toLocaleString("en",{maximumFractionDigits:2})}`:"—"}</td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:h.price?col:C.textDim}}>{h.price?`${h.pnlPct>=0?"+":""}${h.pnlPct.toFixed(1)}%`:"—"}</td>
                    <td style={{padding:"8px 10px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMid}}>{alloc.toFixed(1)}%</td>
                    <td style={{padding:"8px 10px",whiteSpace:"nowrap"}}>
                      {isEditing?(
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>saveEdit(h.id)} style={{padding:"2px 8px",background:C.green,border:"none",borderRadius:4,color:"#000",fontSize:10,fontWeight:700,cursor:"pointer"}}>✓</button>
                          <button onClick={()=>setEditId(null)} style={{padding:"2px 6px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.textDim,fontSize:10,cursor:"pointer"}}>✕</button>
                        </div>
                      ):(
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={()=>startEdit(h)} style={{padding:"2px 8px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.textDim,fontSize:10,cursor:"pointer"}}>Edit</button>
                          <button onClick={()=>removeH(h.id)} style={{padding:"2px 6px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:4,color:C.red,fontSize:10,cursor:"pointer"}}>✕</button>
                        </div>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {!COIN_IDS[rows[0]?.sym?.toUpperCase()]&&rows.length>0&&(
            <div style={{padding:"8px 16px",fontSize:10,color:C.yellow}}>⚠ Some coins may not have CoinGecko IDs mapped. Prices may not load.</div>
          )}
        </div>
      </div>
    </div>
  );
}


// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function NVJournal(){
  const [isDark,setIsDark]=useStorage("nv_theme",true);
  const C=isDark?DARK:LIGHT;
  const [trades,setTrades]=useState(()=>{try{const s=localStorage.getItem("nv_trades_v5");return s?JSON.parse(s):[];}catch{return[];}});
  const [days,setDays]=useState(()=>{try{const s=localStorage.getItem("nv_days_v2");return s?JSON.parse(s):[];}catch{return[];}});
  const [syncing,setSyncing]=useState(false);
  useEffect(()=>{try{localStorage.setItem("nv_trades_v5",JSON.stringify(trades));}catch{}},[trades]);
  useEffect(()=>{try{localStorage.setItem("nv_days_v2",JSON.stringify(days));}catch{}},[days]);
  useEffect(()=>{
    (async()=>{
      setSyncing(true);
      const [t,d]=await Promise.all([sbLoad("trades"),sbLoad("days")]);
      if(t!==null)setTrades(t);
      if(d!==null)setDays(d);
      setSyncing(false);
    })();
  },[]);
  const [tab,setTab]=useState("Dashboard");
  function switchTab(t){setTab(t);window.scrollTo({top:0,behavior:"instant"});}
  const [period,setPeriod]=useState("All");
  const [dashView,setDashView]=useState("Live"); // Live / All
  const [tradesView,setTradesView]=useState("Live"); // Live / All
  const [tf,setTf]=useState(INIT_TRADE());
  const [df,setDf]=useState(INIT_DAY());
  const [selected,setSelected]=useState(new Set());
  const [detailTrade,setDetailTrade]=useState(null);

  // Dashboard data source
  const dashSource=useMemo(()=>dashView==="Live"?trades.filter(t=>t.trade_taken):trades,[trades,dashView]);
  const dashFiltered=useMemo(()=>filterByPeriod(dashSource,period),[dashSource,period]);
  const metrics=useMemo(()=>calcMetrics(dashFiltered, true),[dashFiltered]);

  // Trades tab data source
  const tradesSource=useMemo(()=>tradesView==="Live"?trades.filter(t=>t.trade_taken):trades,[trades,tradesView]);
  const tradesFiltered=useMemo(()=>filterByPeriod(tradesSource,period),[tradesSource,period]);
  const tradesMetrics=useMemo(()=>calcMetrics(tradesFiltered),[tradesFiltered]);

  const gradeResult=useMemo(()=>calcGrade(tf),[tf]);
  const updTf=(k,v)=>setTf(f=>({...f,[k]:v}));
  const updDf=(k,v)=>setDf(f=>({...f,[k]:v}));
  const togConf=k=>updTf(k,!tf[k]);

  function exportCSV(){
    const headers=["date","pair","session","direction","grade","trade_taken","r_result","outcome","hypo_result","hypo_outcome","no_trade_reason","hesitation","key_zone","notes","chart_link",...ALL_CONFS.map(c=>c.key),"ltf_5m_cisd"];
    const rows=trades.map(t=>headers.map(h=>{const v=t[h];return typeof v==="boolean"?(v?"1":"0"):(v??"")}));
    const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download=`NVJournal_${today()}.csv`;a.click();
  }
  function importCSV(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const lines=e.target.result.split("\n").filter(Boolean);
      if(lines.length<2){alert("Empty CSV");return;}
      const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
      const imported=lines.slice(1).map(line=>{
        const vals=[];let cur="",inQ=false;
        for(const ch of line){if(ch==="\""){inQ=!inQ;}else if(ch===","&&!inQ){vals.push(cur);cur="";}else cur+=ch;}
        vals.push(cur);
        const obj={id:Date.now()+Math.random()};
        headers.forEach((h,i)=>{
          const v=(vals[i]||"").replace(/"/g,"").trim();
          obj[h]=v==="1"?true:v==="0"?false:v;
        });
        if(!obj.grade)obj.grade=calcGrade(obj).grade;
        return obj;
      });
      if(window.confirm(`Import ${imported.length} trades? This will ADD to existing trades.`)){
        setTrades(p=>[...p,...imported]);
        imported.forEach(r=>sbSave("trades",r));
        alert(`Imported ${imported.length} trades successfully!`);
      }
    };
    reader.readAsText(file);
  }
  function saveTrade(){
    if(tf.trade_taken&&tf.r_result===""){alert("Enter R Result");return;}
    const gr=calcGrade(tf);
    const rec={...tf,grade:gr.grade,score:gr.score,id:Date.now()};
    setTrades(p=>[...p,rec]);
    setTf(INIT_TRADE());
    sbSave("trades",rec);
  }
  function saveDay(){const rec={...df,id:Date.now()};setDays(p=>[...p,rec]);setDf(INIT_DAY());sbSave("days",rec);}
  function deleteSelected(){
    if(!selected.size)return;
    if(window.confirm(`Delete ${selected.size} trade(s)?`)){const ids=[...selected];ids.forEach(id=>sbDel("trades",id));setTrades(p=>p.filter(t=>!ids.includes(t.id)));setSelected(new Set());}
  }
  function clearAll(){
    if(window.confirm("Delete ALL data? Cannot be undone.")){trades.forEach(t=>sbDel("trades",t.id));days.forEach(d=>sbDel("days",d.id));setTrades([]);setDays([]);setSelected(new Set());setDetailTrade(null);}
  }
  function togSelect(id){setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});}
  function togSelectAll(list){
    const ids=list.map(t=>t.id);
    const allSel=ids.every(id=>selected.has(id));
    if(allSel)setSelected(s=>{const n=new Set(s);ids.forEach(id=>n.delete(id));return n;});
    else setSelected(s=>{const n=new Set(s);ids.forEach(id=>n.add(id));return n;});
  }

  const CSS=`
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap');
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:${C.bg};color:${C.text};font-family:'Inter',sans-serif;min-height:100vh;}
    ::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-track{background:${C.bg};}::-webkit-scrollbar-thumb{background:${C.border};border-radius:2px;}
    input,select,textarea{background:${isDark?"#0d0d0d":"#fff"};color:${C.text};border:1px solid ${isDark?"#333":C.border};border-radius:5px;padding:7px 10px;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;outline:none;transition:border-color .15s;}
    input:focus,select:focus,textarea:focus{border-color:${C.accentDim};box-shadow:0 0 0 2px ${C.accentGlow};}
    select option{background:${isDark?"#111":"#fff"};}
    textarea{resize:vertical;}button{cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;}
    input[type=checkbox]{width:14px;height:14px;accent-color:${C.accent};cursor:pointer;}
    .lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:${C.textDim};font-weight:600;display:block;margin-bottom:4px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    .fade{animation:fadeUp .18s ease forwards;}
  `;

  // ── Shared UI ──
  const Card=({children,style={}})=><div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:C.shadow,...style}}>{children}</div>;
  const Sect=({children})=><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:15,letterSpacing:".14em",color:C.textMid,borderBottom:`1px solid ${C.border}`,paddingBottom:8,marginBottom:14}}>{children}</div>;
  const Fld=({label,children})=><div><span className="lbl">{label}</span>{children}</div>;

  const Toggle2=({val,a,b,onChange})=>(
    <div style={{display:"flex",gap:2,background:isDark?"#000":C.surfaceHigh,borderRadius:7,padding:3,border:`1px solid ${C.border}`}}>
      {[a,b].map(opt=>(
        <button key={opt} onClick={()=>onChange(opt)} style={{padding:"4px 14px",borderRadius:5,border:"none",fontSize:11,fontWeight:600,letterSpacing:".04em",background:val===opt?C.accent:"transparent",color:val===opt?(isDark?"#000":"#fff"):C.textMid}}>{opt}</button>
      ))}
    </div>
  );

  const Periods=()=>(
    <div style={{display:"flex",gap:2,background:isDark?"#000":C.surfaceHigh,borderRadius:7,padding:3,border:`1px solid ${C.border}`}}>
      {["Week","Month","YTD","All"].map(p=>(
        <button key={p} onClick={()=>setPeriod(p)} style={{padding:"4px 12px",borderRadius:5,border:"none",fontSize:11,fontWeight:500,background:period===p?C.accent:"transparent",color:period===p?(isDark?"#000":"#fff"):C.textMid}}>{p}</button>
      ))}
    </div>
  );

  const Stat=({label,value,color,sub,size="md"})=>{
    const fs=size==="xl"?42:size==="lg"?28:20;
    return(
      <Card>
        <span className="lbl">{label}</span>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:fs,color:color||C.text,lineHeight:1.05,marginTop:2}}>{value}</div>
        {sub&&<div style={{fontSize:10,color:C.textDim,fontFamily:"'JetBrains Mono',monospace",marginTop:3}}>{sub}</div>}
      </Card>
    );
  };

  const Chk=({label,checked,onChange,stars,highlight})=>{
    const col=highlight||C.accent;
    return(
      <label style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",fontSize:11,color:checked?col:C.textDim,padding:"5px 9px",border:`1px solid ${checked?col:C.border}`,borderRadius:6,background:checked?`${col}18`:"transparent",transition:"all .15s",userSelect:"none"}}>
        <div onClick={onChange} style={{width:13,height:13,border:`1.5px solid ${checked?col:C.border}`,borderRadius:3,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {checked&&<svg width="8" height="8" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke={col} strokeWidth="1.5" fill="none" strokeLinecap="round"/></svg>}
        </div>
        <span style={{flex:1}}>{label}</span>
        {stars&&<span style={{fontSize:8,color:checked?col:C.textDim}}>{[...Array(Math.min(stars,3))].map(()=>"★").join("")}{stars>3?"+":""}</span>}
      </label>
    );
  };

  const Tog=({label,checked,onChange})=>(
    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
      <div onClick={onChange} style={{width:34,height:18,borderRadius:9,background:checked?C.accentDim:C.border,position:"relative",transition:"background .2s",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:checked?18:2,width:14,height:14,borderRadius:7,background:checked?C.accent:C.textDim,transition:"left .2s"}}/>
      </div>
      <span style={{fontSize:12,color:checked?C.accent:C.textDim}}>{label}</span>
    </label>
  );

  // ── Dashboard panels ──
  const EquityCurve=({data})=>{
    const sorted=[...data].filter(t=>t.trade_taken).sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length)return<Card style={{height:100,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{color:C.textDim,fontSize:12}}>No executed trades yet</span></Card>;
    let cum=0;
    const pts=sorted.map(t=>{cum+=parseFloat(t.r_result||0);return+cum.toFixed(2);});
    const W=600,H=80,p=8;
    const mn=Math.min(0,...pts),mx=Math.max(0,...pts),rng=mx-mn||1;
    const x=i=>p+(i/Math.max(pts.length-1,1))*(W-p*2);
    const y=v=>H-p-((v-mn)/rng)*(H-p*2);
    const zy=y(0);
    const path=pts.map((v,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    const fill=`${path} L${x(pts.length-1).toFixed(1)},${zy} L${p},${zy} Z`;
    const last=pts[pts.length-1];
    const lc=last>=0?C.green:C.red;
    return(
      <Card>
        <span className="lbl">Equity Curve</span>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:80,marginTop:6}}>
          <line x1={p} y1={zy} x2={W-p} y2={zy} stroke={C.border} strokeWidth={1} strokeDasharray="4 3"/>
          <path d={fill} fill={last>=0?"rgba(61,214,140,0.06)":"rgba(240,100,100,0.06)"}/>
          <path d={path} fill="none" stroke={lc} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>

        </svg>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:2}}>
          <span style={{fontSize:9,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{sorted[0]?.date}</span>
          <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:lc}}>{last>0?"+":""}{last}R</span>
          <span style={{fontSize:9,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{sorted[sorted.length-1]?.date}</span>

  const DrawdownPanel=({m})=>(

      <span className="lbl">Risk Metrics</span>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.textMid}}>Max Drawdown</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:C.red}}>-{m.maxDrawdown}R</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.textMid}}>Current Streak</span>
          <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:m.curStreakType==="W"?C.green:m.curStreakType==="L"?C.red:C.textDim}}>
            {m.curStreak}{m.curStreakType?` ${m.curStreakType}`:""}
          </span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:C.textMid}}>Best Win Streak</span>
          <span style={{fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:C.green}}>{m.maxWinStreak}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

          <span style={{fontSize:11,color:C.textMid}}>Avg RR</span>
          <span style={{fontSize:13,fontFamily:"'JetBrains Mono',monospace",color:C.accent}}>{m.avgLoss>0?`${(m.avgWin/m.avgLoss).toFixed(2)}:1`:"—"}</span>
        </div>
      </div>
    </Card>
  );

  const BestWorstPanel=({m,onClick})=>(
    <Card>
      <span className="lbl">Best / Worst Trade</span>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
        {[{label:"Best Trade",t:m.bestTrade,col:C.green},{label:"Worst Trade",t:m.worstTrade,col:C.red}].map(({label,t,col})=>(
          <div key={label} onClick={()=>t&&onClick(t)} style={{padding:"8px 12px",background:isDark?"#000":C.surfaceHigh,borderRadius:7,border:`1px solid ${t?col:C.border}`,cursor:t?"pointer":"default"}}>
            <div style={{fontSize:9,color:C.textDim,letterSpacing:".1em",textTransform:"uppercase",marginBottom:4}}>{label}</div>
            {t?(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:24,color:col}}>{parseFloat(t.r_result)>0?"+":""}{parseFloat(t.r_result)}R</span>
                <div>
                  <div style={{fontSize:11,color:C.text}}>{t.pair} · {t.session} · {t.date}</div>
                  <div style={{fontSize:10,color:C.textDim}}>Grade {t.grade} · {t.direction}</div>

              </div>

        ))}
      </div>
    </Card>
  );

  const SessionPanel=({data})=>{
    const ex=data.filter(t=>t.trade_taken);
    const sData=SESSIONS.map(s=>({s,...calcMetrics(ex.filter(t=>t.session===s))}));
    const maxR=Math.max(...sData.map(d=>Math.abs(d.totalR)),0.1);
    return(
      <Card>
        <span className="lbl">Session Performance</span>
        <div style={{marginTop:10,display:"flex",flexDirection:"column",gap:10}}>
          {sData.map(({s,total,totalR,winRate})=>(
            <div key={s}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,color:C.text,fontWeight:500}}>{s}</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:10,color:C.textMid,fontFamily:"'JetBrains Mono',monospace"}}>{total}T</span>
                  <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:C.accent}}>{winRate}%</span>
                  <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:totalR>=0?C.green:C.red}}>{totalR>0?"+":""}{totalR}R</span>
                </div>
              </div>
              <div style={{height:3,background:isDark?"#000":C.surfaceHigh,borderRadius:2}}>
                <div style={{height:"100%",width:`${(Math.abs(totalR)/maxR)*100}%`,background:totalR>=0?C.green:C.red,borderRadius:2}}/>
              </div>
            </div>
          ))}
        </div>
      </Card>
    );
  };

  const PairSessionMatrix=({data})=>{
    const ex=data.filter(t=>t.trade_taken);

        <span className="lbl">Pair × Session Win Rate</span>
        <div style={{marginTop:10,overflowX:"auto"}}>

              </tr>
            </thead>
            <tbody>
              {PAIRS.map(pair=>(

  const BiasEngine=()=>{
    const valid=days.filter(d=>d.outcome!=="Trash Day");
    const correct=valid.filter(d=>d.outcome==="Correct");
    const acc=valid.length?+((correct.length/valid.length)*100).toFixed(1):0;
    const r=30,circ=2*Math.PI*r;
    const arcC=acc>=60?C.green:acc>=40?C.yellow:C.red;
    return(
      <Card>
        <span className="lbl">Bias Accuracy</span>
        <div style={{display:"flex",alignItems:"center",gap:16,marginTop:10}}>
          <div style={{position:"relative",width:76,height:76,flexShrink:0}}>
            <svg viewBox="0 0 80 80">
              <circle cx={40} cy={40} r={r} fill="none" stroke={isDark?"#000":C.surfaceHigh} strokeWidth={9}/>
              <circle cx={40} cy={40} r={r} fill="none" stroke={arcC} strokeWidth={9} strokeDasharray={`${circ*acc/100} ${circ}`} strokeLinecap="round" transform="rotate(-90 40 40)"/>
            </svg>
            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue'",fontSize:18,color:C.accent}}>{acc}%</div>

  const ConfluenceStats=({data})=>{
    const ex=data.filter(t=>t.trade_taken);
    return(
      <Card>
        <span className="lbl">Confluence Win-Rate</span>
        
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {ALL_CONFS.map(conf=>{
            const w=ex.filter(t=>t[conf.key]);
            const wo=ex.filter(t=>!t[conf.key]);
            const mw=calcMetrics(w);
            const mwo=calcMetrics(wo);
            const enough=w.length>=MIN_SAMPLE;
            const diff=mw.winRate-mwo.winRate;
            const barC=mw.winRate>=60?C.green:mw.winRate>=45?C.yellow:C.red;
            return(
              <div key={conf.key} style={{padding:"4px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <span style={{fontSize:11,color:C.text,flex:1}}>{conf.label}</span>
                  <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:C.textDim,width:24,textAlign:"right"}}>{w.length}T</span>
                  <span style={{fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:enough?barC:C.textDim,width:38,textAlign:"right"}}>{enough?`${mw.winRate}%`:"—"}</span>
                  <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",color:enough?(diff>0?C.green:diff<0?C.red:C.textDim):C.textDim,width:36,textAlign:"right"}}>{enough&&wo.length>0?(diff>0?"+":"")+diff.toFixed(0)+"%":""}</span>

                <div style={{height:2,background:isDark?"#000":C.surfaceHigh,borderRadius:1}}>
                  {enough?<div style={{height:"100%",width:`${mw.winRate}%`,background:barC,borderRadius:1}}/>
                  :w.length>0&&<div style={{height:"100%",width:`${(w.length/MIN_SAMPLE)*100}%`,background:C.border,borderRadius:1}}/>}
                </div>
                
              </div>

        </div>
        <div style={{marginTop:6,fontSize:9,color:C.textDim}}>Δ = difference vs trades without confluence</div>

  const CandleStats=({data})=>{

    const mY=calcMetrics(filterByPeriod(ex,"YTD"));
    const mA=calcMetrics(ex);
    const items=[

  // ── Discipline Panel ──
  const DisciplinePanel=({data,allData})=>{
    const ex=data.filter(t=>t.trade_taken);
    const allWithGrade=data.map(t=>({...t,_grade:t.grade||calcGrade(t).grade}));
    const validSetups=allWithGrade.filter(t=>t._grade!=="B");
    const taken=validSetups.filter(t=>t.trade_taken);
    const missed=validSetups.filter(t=>!t.trade_taken);
    const ruleBreaks=allWithGrade.filter(t=>t._grade==="B"&&t.trade_taken);
    const hesitations=ex.filter(t=>t.hesitation);
    const execRate=validSetups.length?Math.round((taken.length/validSetups.length)*100):0;
    const execCol=execRate>=80?C.green:execRate>=60?C.yellow:C.red;
    const rbCol=ruleBreaks.length===0?C.green:C.red;
    return(
      <Card>
        <span className="lbl">Discipline & Execution</span>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
          <div style={{background:isDark?"#000":C.surfaceHigh,borderRadius:8,padding:"10px 12px",border:`1px solid ${execCol}22`}}>

              ["Rule Breaks",ruleBreaks.length,rbCol],
              ["Hesitations",hesitations.length,hesitations.length===0?C.green:C.yellow],
            ].map(([l,v,col])=>(
              <div key={l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:4,borderBottom:`1px solid ${C.border}`}}>

  const OpportunityPanel=({data})=>{
    const allWithGrade=data.map(t=>({...t,_grade:t.grade||calcGrade(t).grade}));

    const taken=validSetups.filter(t=>t.trade_taken);
    const missed=validSetups.filter(t=>!t.trade_taken);
    const takenM=calcMetrics(taken);
    const missedR=missed.reduce((s,t)=>s+(t.r_result?parseFloat(t.r_result):0),0);

    const pCol=potentialR>=0?C.green:C.red;

              {wTrades.length===0?<div style={{color:C.textDim,fontSize:12}}>None</div>:(
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  {[...wWithGrade].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>{
                    const r=parseFloat(t.r_result||0);
                    const tGrade=t._grade||t.grade||calcGrade(t).grade;
                    const gc=tGrade==="A+"?C.gradeAp:tGrade==="A"?C.gradeA:C.gradeB;
                    return(
                      <div key={t.id} onClick={()=>setDetailTrade(t)} style={{display:"grid",gridTemplateColumns:"88px 70px 50px 50px 56px 60px 1fr 26px",gap:6,padding:"7px 10px",background:isDark?"#000":C.surfaceHigh,borderRadius:7,border:`1px solid ${C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",alignItems:"center",cursor:"pointer"}}>
                        <span style={{color:C.textMid}}>{t.date}</span>
                        <span style={{color:C.text}}>{t.pair}</span>
                        <span style={{color:C.textDim}}>{t.session}</span>
                        <span style={{color:t.direction==="Long"?C.green:C.red}}>{t.direction}</span>
                        <span style={{color:gc,fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{tGrade}</span>
                        <span style={{color:t.trade_taken?(r>0?C.green:r<0?C.red:C.textDim):C.textDim}}>{t.trade_taken?`${r>0?"+":""}${r}R`:"Skip"}</span>
                        <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.notes||t.no_trade_reason||""}</span>
                        <span style={{fontSize:10,color:C.blue}}>→</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </Card>
          </>
        )}
      </div>
    );
  };

  // ── Trade row ──
  const TradeRow=({t,showSelect=true})=>{
    const r=parseFloat(t.r_result||0);
    const gc=t.grade==="A+"?C.gradeAp:t.grade==="A"?C.gradeA:C.gradeB;
    const isRuleBreak=t.grade==="B"&&t.trade_taken;
    const isSel=selected.has(t.id);
    const confsActive=ALL_CONFS.filter(c=>t[c.key]).map(c=>c.label.split(" ").pop()).join(" ");
    return(
      <div onClick={()=>setDetailTrade(t)} style={{display:"grid",gridTemplateColumns:`${showSelect?"20px ":""}88px 70px 46px 46px 60px 56px 70px 56px 28px 1fr 26px`,gap:5,padding:"7px 10px",background:isSel?(isDark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)"):C.surface,borderRadius:7,border:`1px solid ${isSel?C.accent:isRuleBreak?C.red:C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",alignItems:"center",boxShadow:C.shadow,cursor:"pointer"}}>
        {showSelect&&<input type="checkbox" checked={isSel} onChange={()=>togSelect(t.id)} onClick={e=>{e.stopPropagation();togSelect(t.id);}}/>}
        <span style={{color:C.textMid}}>{t.date}</span>
        <span style={{color:C.text}}>{t.pair}</span>
        <span style={{color:C.textDim}}>{t.session}</span>
        <span style={{color:t.direction==="Long"?C.green:C.red}}>{t.direction}</span>
        <div style={{display:"flex",alignItems:"center",gap:3}}>
          <span style={{color:gc,fontFamily:"'Bebas Neue',sans-serif",fontSize:14}}>{t.grade}</span>
          {isRuleBreak&&<span style={{fontSize:8,color:C.red}}>⚠</span>}
        </div>
        <span style={{color:t.trade_taken?(r>0?C.green:r<0?C.red:C.textDim):C.textDim}}>{t.trade_taken?`${r>0?"+":""}${r}R`:"—"}</span>
        <span style={{fontSize:9,color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{confsActive}</span>
        <span style={{fontSize:9,color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.key_zone}</span>
        <span onClick={e=>e.stopPropagation()}>{t.chart_link?<a href={t.chart_link} target="_blank" rel="noopener noreferrer" style={{color:C.blue,textDecoration:"none",fontSize:12}}>↗</a>:<span style={{color:C.textDim}}>—</span>}</span>
        <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{t.notes}</span>
        <button onClick={e=>{e.stopPropagation();if(window.confirm("Delete?")){sbDel("trades",t.id);setTrades(p=>p.filter(x=>x.id!==t.id));}}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"1px 5px",fontSize:9}}>✕</button>
      </div>
    );
  };

  return(
    <>
      <style>{CSS}</style>
      <div style={{minHeight:"100vh",background:C.bg}}>

        {/* NAV */}
        <div style={{borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px",height:52,position:"sticky",top:0,background:C.surface,zIndex:150,boxShadow:C.shadow}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <NVLogo size={32} isDark={isDark} onClick={()=>switchTab("Dashboard")}/>
            <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:13,color:C.textMid,letterSpacing:".18em"}}>JOURNAL</span>
          </div>
          <nav style={{display:"flex",gap:2}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>switchTab(t)} style={{padding:"5px 14px",border:"none",borderRadius:5,fontSize:11,letterSpacing:".06em",fontWeight:500,background:tab===t?C.accentGlow:"transparent",color:tab===t?C.accent:C.textMid,borderBottom:tab===t?`1.5px solid ${C.accent}`:"1.5px solid transparent"}}>{t}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <><span style={{fontSize:10,color:C.textDim,fontFamily:"'JetBrains Mono',monospace"}}>{today()}</span>{syncing&&<span style={{fontSize:9,color:C.textDim,marginLeft:8}}>⟳ syncing</span>}</>
            <button onClick={()=>setIsDark(d=>!d)} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 11px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:20,color:C.textMid,fontSize:11}}>
              <span>{isDark?"☀️":"🌙"}</span><span>{isDark?"Light":"Dark"}</span>
            </button>
            <button onClick={clearAll} style={{padding:"4px 11px",background:"transparent",border:`1px solid ${C.red}`,borderRadius:20,color:C.red,fontSize:11}}>🗑 Clear All</button>
          </div>
        </div>

        <div style={{maxWidth:1160,margin:"0 auto",padding:"18px 16px"}}>

          {/* ══ DASHBOARD ══ */}
          {tab==="Dashboard"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Sect>Performance Overview</Sect>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <Toggle2 val={dashView} a="Live" b="All" onChange={setDashView}/>
                  <Periods/>
                </div>
              </div>
              <PeriodStrip allTrades={trades}/>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <Stat label="Total Trades" value={metrics.total} color={C.accent} size="lg"/>
                <Stat label="Total R" value={`${metrics.totalR>0?"+":""}${metrics.totalR}R`} color={metrics.totalR>0?C.green:metrics.totalR<0?C.red:C.text} size="xl"/>
                <Stat label="Win Rate" value={`${metrics.winRate}%`} color={metrics.winRate>=50?C.green:C.red} size="lg"/>
                <Stat label="Expectancy" value={`${metrics.expectancy}R`} color={metrics.expectancy>0?C.green:metrics.expectancy<0?C.red:C.text} size="lg"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                <Stat label="Profit Factor" value={metrics.profitFactor} color={C.accent} sub={`${metrics.wins}W · ${metrics.losses}L · ${metrics.be}BE`}/>
                <Stat label="Avg Win" value={`+${metrics.avgWin}R`} color={C.green}/>
                <Stat label="Avg Loss" value={`-${metrics.avgLoss}R`} color={C.red}/>
                <Stat label="Avg RR" value={metrics.avgLoss>0?`${(metrics.avgWin/metrics.avgLoss).toFixed(2)}:1`:"—"} color={C.accent}/>
              </div>
              <EquityCurve data={dashFiltered}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <SessionPanel data={dashFiltered}/>
                <DrawdownPanel m={metrics}/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <DisciplinePanel data={dashFiltered} allData={dashSource}/>
                <OpportunityPanel data={dashFiltered}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <PairStats data={dashFiltered}/>
                <DirectionStats data={dashFiltered}/>
              </div>
              <PairSessionMatrix data={dashFiltered}/>
              <BiasEngine/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <ConfluenceStats data={dashFiltered}/>
                <CandleStats data={dashFiltered}/>
              </div>
            </div>
          )}

          {/* ══ TRADES ══ */}
          {tab==="Trades"&&(

                  <Toggle2 val={tradesView} a="Live" b="All" onChange={v=>{setTradesView(v);setSelected(new Set());}}/>

              </div>
              {/* Quick stats */}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["Trades",tradesView==="Live"?tradesMetrics.total:tradesFiltered.length,C.accent],["R",`${tradesMetrics.totalR>0?"+":""}${tradesMetrics.totalR}R`,tradesMetrics.totalR>=0?C.green:C.red],["Win%",`${tradesMetrics.winRate}%`,C.accent],["PF",tradesMetrics.profitFactor,C.text],["Exp",`${tradesMetrics.expectancy}R`,tradesMetrics.expectancy>=0?C.green:C.red],["Avg W",`+${tradesMetrics.avgWin}R`,C.green],["Avg L",`-${tradesMetrics.avgLoss}R`,C.red]].map(([l,v,col])=>(
                  <div key={l} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 12px",boxShadow:C.shadow}}>
                    <span className="lbl">{l}</span>
                    <span style={{fontSize:15,fontFamily:"'Bebas Neue',sans-serif",color:col}}>{v}</span>
                  </div>
                ))}
                {tradesView==="All"&&(
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 12px",boxShadow:C.shadow}}>
                    <span className="lbl">Missed A/A+</span>
                    <span style={{fontSize:15,fontFamily:"'Bebas Neue',sans-serif",color:C.yellow}}>{tradesFiltered.filter(t=>t.grade!=="B"&&!t.trade_taken).length}</span>
                  </div>
                )}
              </div>
              {/* Select controls */}
              <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                <button onClick={exportCSV} style={{padding:"4px 14px",background:"transparent",border:`1px solid ${C.green}`,borderRadius:5,color:C.green,fontSize:11}}>↓ Export CSV</button>
                <label style={{padding:"4px 14px",background:"transparent",border:`1px solid ${C.blue}`,borderRadius:5,color:C.blue,fontSize:11,cursor:"pointer"}}>
                  ↑ Import CSV<input type="file" accept=".csv" style={{display:"none"}} onChange={e=>importCSV(e.target.files[0])}/>
                </label>
              </div>
              {tradesFiltered.length>0&&(
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <button onClick={()=>togSelectAll(tradesFiltered)} style={{padding:"3px 12px",background:"transparent",border:`1px solid ${C.border}`,borderRadius:5,color:C.textMid,fontSize:11}}>
                    {tradesFiltered.every(t=>selected.has(t.id))?"Deselect All":"Select All"}
                  </button>
                  {selected.size>0&&(
                    <button onClick={deleteSelected} style={{padding:"3px 12px",background:"transparent",border:`1px solid ${C.red}`,borderRadius:5,color:C.red,fontSize:11}}>
                      Delete Selected ({selected.size})
                    </button>
                  )}
                  {selected.size>0&&<span style={{fontSize:10,color:C.textDim}}>{selected.size} selected</span>}
                </div>
              )}
              {/* Header */}
              <div style={{display:"grid",gridTemplateColumns:"20px 88px 70px 46px 46px 60px 56px 70px 56px 28px 1fr 26px",gap:5,padding:"3px 10px",fontSize:9,letterSpacing:".1em",color:C.textDim,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`}}>
                {["","Date","Pair","Sess","Dir","Grade","R","Confluences","Zone","📎","Notes",""].map((h,i)=><span key={i}>{h}</span>)}
              </div>
              {[...tradesFiltered].sort((a,b)=>b.date.localeCompare(a.date)).map(t=><TradeRow key={t.id} t={t}/>)}
              {tradesFiltered.length===0&&<div style={{textAlign:"center",padding:50,color:C.textDim,fontSize:12}}>No trades in this period</div>}
            </div>
          )}

          {/* ══ REVIEW ══ */}
          {tab==="Review"&&<WeeklyReview/>}

          {/* ══ DAYS ══ */}
          {tab==="Days"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Sect>Daily Bias Engine</Sect>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span className="lbl" style={{margin:0}}>Morning — Set Bias</span>
                    <span style={{fontSize:9,color:C.textDim}}>Set before market open</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <Fld label="Date"><input type="date" value={df.date} onChange={e=>updDf("date",e.target.value)}/></Fld>
                    <Fld label="Bias Direction"><select value={df.bias} onChange={e=>updDf("bias",e.target.value)}>{BIAS_OPTS.map(b=><option key={b}>{b}</option>)}</select></Fld>
                    <Fld label="Notes (optional)"><textarea rows={2} value={df.notes} onChange={e=>updDf("notes",e.target.value)}/></Fld>
                    <button onClick={saveDay} style={{padding:"8px 20px",background:C.accent,border:"none",color:isDark?"#000":"#fff",borderRadius:6,fontSize:12,fontWeight:700,alignSelf:"flex-start"}}>SET MORNING BIAS</button>
                  </div>
                </Card>
                <BiasEngine/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {[...days].sort((a,b)=>b.date.localeCompare(a.date)).map(d=>{
                  const isPending=!d.outcome||d.outcome==="";
                  const bc=d.outcome==="Correct"?C.green:d.outcome==="Wrong"?C.red:d.outcome==="Trash Day"?C.textDim:C.yellow;
                  return(
                    <div key={d.id} style={{display:"grid",gridTemplateColumns:"100px 90px 1fr 1fr 40px",gap:8,padding:"9px 12px",background:C.surface,borderRadius:8,border:`1px solid ${isPending?C.yellow:C.border}`,fontSize:11,fontFamily:"'JetBrains Mono',monospace",alignItems:"center",boxShadow:C.shadow}}>
                      <span style={{color:C.textMid}}>{d.date}</span>
                      <span style={{color:d.bias==="Bullish"?C.green:d.bias==="Bearish"?C.red:C.textMid,fontWeight:600}}>{d.bias}</span>
                      {isPending?(
                        <div style={{display:"flex",alignItems:"center",gap:6,gridColumn:"3/5"}}>
                          <span style={{fontSize:10,color:C.yellow}}>⏳ Awaiting confirmation</span>
                          <select defaultValue="" onChange={e=>{if(!e.target.value)return;const updated={...d,outcome:e.target.value};setDays(p=>p.map(x=>x.id===d.id?updated:x));sbSave("days",updated);}} style={{fontSize:10,padding:"2px 6px",background:isDark?"#0d0d0d":"#fff",color:C.text,border:`1px solid ${C.yellow}`,borderRadius:4}}>
                            <option value="">Confirm...</option>
                            {BIAS_OUT.map(b=><option key={b}>{b}</option>)}
                          </select>
                        </div>
                      ):(
                        <>
                          <span style={{color:bc,fontWeight:600}}>{d.outcome}</span>
                          <span style={{color:C.textDim,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{d.notes}</span>
                        </>
                      )}
                      <button onClick={()=>{sbDel("days",d.id);setDays(p=>p.filter(x=>x.id!==d.id));}} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:4,padding:"2px 6px",fontSize:9}}>✕</button>
                    </div>
                  );
                })}
                {days.length===0&&<div style={{textAlign:"center",padding:40,color:C.textDim,fontSize:12}}>No days logged yet</div>}
              </div>
            </div>
          )}

          {/* ══ LOG TRADE ══ */}
          {tab==="Log Trade"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:14,alignItems:"start"}}>
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <Sect>Log Setup / Trade</Sect>
                <Card>
                  <span className="lbl" style={{marginBottom:10}}>Setup Info</span>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                    <Fld label="Date"><input type="date" value={tf.date} onChange={e=>updTf("date",e.target.value)}/></Fld>
                    <Fld label="Pair"><select value={tf.pair} onChange={e=>updTf("pair",e.target.value)}>{PAIRS.map(p=><option key={p}>{p}</option>)}</select></Fld>
                    <Fld label="Session"><select value={tf.session} onChange={e=>updTf("session",e.target.value)}>{SESSIONS.map(s=><option key={s}>{s}</option>)}</select></Fld>
                    <Fld label="Direction"><select value={tf.direction} onChange={e=>updTf("direction",e.target.value)}>{DIRECTIONS.map(d=><option key={d}>{d}</option>)}</select></Fld>
                  </div>
                </Card>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span className="lbl" style={{margin:0}}>HTF Bias + Candle Position</span>
                    <span style={{fontSize:9,color:C.accent}}>★★★</span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
                    {[["Daily Bias","daily_bias"],["H4 Bias","h4_bias"],["H1 Bias","h1_bias"]].map(([lbl,key])=>(
                      <Fld key={key} label={lbl}><select value={tf[key]} onChange={e=>updTf(key,e.target.value)}>{BIAS_OPTS.map(b=><option key={b}>{b}</option>)}</select></Fld>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
                    {[["Daily Candle","daily_candle"],["H4 Candle","h4_candle"],["H1 Candle","h1_candle"]].map(([lbl,key])=>(
                      <Fld key={key} label={lbl}>
                        <select value={tf[key]} onChange={e=>updTf(key,e.target.value)} style={{borderColor:tf[key]==="C5+"?C.red:C.border,color:tf[key]==="C5+"?C.red:C.text}}>
                          {CANDLE_POS.map(c=><option key={c}>{c}{c==="C5+"?" — NOT TRADEABLE":""}</option>)}
                        </select>
                      </Fld>
                    ))}
                  </div>
                  <div style={{padding:"8px 12px",background:isDark?"#000":C.surfaceHigh,borderRadius:6,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
                    <span style={{fontSize:10,color:C.textMid,textTransform:"uppercase",flexShrink:0}}>5M</span>
                    <Chk label="5M CISD Confirmed" checked={tf.ltf_5m_cisd} onChange={()=>togConf("ltf_5m_cisd")} stars={3}/>
                    <span style={{fontSize:10,color:C.textDim,marginLeft:"auto",whiteSpace:"nowrap"}}>CISD only on 5M</span>
                  </div>
                  <div style={{padding:"5px 10px",borderRadius:5,background:isDark?"#000":C.surfaceHigh,border:`1px solid ${C.border}`,fontSize:11,display:"flex",gap:12,flexWrap:"wrap"}}>
                    {tf.daily_bias!=="Neutral"&&tf.daily_bias===tf.h4_bias&&tf.h4_bias===tf.h1_bias
                      ?<span style={{color:C.green}}>✓ All 3 TFs aligned — 3★</span>
                      :tf.h4_bias!=="Neutral"&&tf.h4_bias===tf.h1_bias
                        ?<span style={{color:C.yellow}}>⚠ H4+H1 aligned, Daily unclear — 1★</span>
                        :<span style={{color:C.red}}>✗ No alignment — 0★</span>
                    }
                    {[tf.daily_candle,tf.h4_candle,tf.h1_candle].some(c=>c==="C5+")&&<span style={{color:C.red}}>⚠ C5+ detected</span>}
                  </div>
                </Card>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span className="lbl" style={{margin:0}}>Key Zone</span>
                    <span style={{fontSize:9,color:C.accent}}>★★</span>
                  </div>
                  <Fld label="Zone"><select value={tf.key_zone} onChange={e=>updTf("key_zone",e.target.value)}>{KEY_ZONES.map(k=><option key={k}>{k}</option>)}</select></Fld>
                </Card>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                    <span className="lbl" style={{margin:0}}>Execution Confluences</span>
                    <span style={{fontSize:9,color:C.red}}>PRIMARY</span>

                </Card>
                <Card>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>

                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    {CONF_STRUCT.map(c=><Chk key={c.key} label={c.label} checked={tf[c.key]} onChange={()=>togConf(c.key)} stars={c.stars} highlight={C.blue}/>)}
                  </div>
                </Card>
                <Card style={{border:`1px solid ${gradeResult.tradeable?C.accentDim:C.border}`}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <span className="lbl" style={{margin:0}}>Execution</span>
                    {!gradeResult.tradeable&&<span style={{fontSize:11,color:C.red,fontWeight:700}}>B — SKIP</span>}
                  </div>
                  <div style={{display:"flex",gap:20,marginBottom:14,alignItems:"center"}}>
                    <Tog label="Trade Taken" checked={tf.trade_taken} onChange={()=>updTf("trade_taken",!tf.trade_taken)}/>
                    <Tog label="Hesitation" checked={tf.hesitation} onChange={()=>updTf("hesitation",!tf.hesitation)}/>
                  </div>
                  {tf.trade_taken?(
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                      <Fld label="R Result"><input type="number" step="0.1" placeholder="e.g. 2.5 or -1" value={tf.r_result} onChange={e=>updTf("r_result",e.target.value)}/></Fld>
                      <Fld label="Outcome"><select value={tf.outcome} onChange={e=>updTf("outcome",e.target.value)}>{OUTCOMES.map(o=><option key={o}>{o}</option>)}</select></Fld>
                    </div>
                  ):(
                    <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:10}}>
                      <Fld label="No-Trade Reason">
                        <select value={tf.no_trade_reason} onChange={e=>updTf("no_trade_reason",e.target.value)}>
                          <option value="">Select reason...</option>
                          {NO_TRADE_R.map(r=><option key={r}>{r}</option>)}
                        </select>
                      </Fld>
                      <div style={{padding:"10px 12px",background:isDark?"#000":C.surfaceHigh,borderRadius:7,border:`1px solid ${C.blue}33`}}>
                        <div style={{fontSize:9,letterSpacing:".12em",textTransform:"uppercase",color:C.blue,fontWeight:600,marginBottom:8}}>Hypothetical Result — What Would Have Happened</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                          <Fld label="Hypo R"><input type="number" step="0.1" placeholder="e.g. 2.5 or -1" value={tf.hypo_result} onChange={e=>updTf("hypo_result",e.target.value)}/></Fld>
                          <Fld label="Hypo Outcome"><select value={tf.hypo_outcome} onChange={e=>updTf("hypo_outcome",e.target.value)}>{OUTCOMES.map(o=><option key={o}>{o}</option>)}</select></Fld>
                        </div>
                      </div>
                    </div>
                  )}
                  <div style={{marginBottom:10}}>
                    <Fld label="Chart Link">
                      <input placeholder="https://www.tradingview.com/chart/..." value={tf.chart_link} onChange={e=>updTf("chart_link",e.target.value)}/>
                    </Fld>
                    {tf.chart_link&&<a href={tf.chart_link} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:C.blue,textDecoration:"none",display:"inline-flex",alignItems:"center",gap:4,marginTop:4}}>↗ Open Chart</a>}
                  </div>
                  <Fld label="Notes"><textarea rows={2} placeholder="Optional notes..." value={tf.notes} onChange={e=>updTf("notes",e.target.value)}/></Fld>
                </Card>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={saveTrade} style={{padding:"10px 26px",background:gradeResult.tradeable?C.accent:C.border,border:"none",color:isDark?"#000":"#fff",borderRadius:7,fontSize:13,fontWeight:700,letterSpacing:".06em"}}>
                    {tf.trade_taken?"SAVE TRADE":(gradeResult.tradeable?"SAVE (Skipped A/A+)":"SAVE (B — Skipped)")}
                  </button>
                  <button onClick={()=>setTf(INIT_TRADE())} style={{padding:"10px 16px",background:"transparent",border:`1px solid ${C.border}`,color:C.textDim,borderRadius:7,fontSize:12}}>Reset</button>
                </div>
              </div>
              <div style={{position:"sticky",top:62}}>
                <GradeMeter gr={gradeResult} C={C}/>
                <div style={{marginTop:10,padding:"10px 14px",background:isDark?"#000":C.surfaceHigh,border:`1px solid ${!gradeResult.tradeable?C.red:gradeResult.grade==="A+"?C.accent:C.blue}`,borderRadius:8}}>
                  {!gradeResult.tradeable&&<><div style={{fontSize:12,color:C.red,fontWeight:700,marginBottom:3}}>B Setup — Do Not Trade</div><div style={{fontSize:11,color:C.textMid,lineHeight:1.5}}>Missing too many confluences.</div></>}
                  {gradeResult.tradeable&&gradeResult.grade==="A+"&&<><div style={{fontSize:12,color:C.accent,fontWeight:700,marginBottom:3}}>A+ Perfect Model</div><div style={{fontSize:11,color:C.textMid,lineHeight:1.5}}>Full alignment. Execute with confidence.</div></>}
                  {gradeResult.tradeable&&gradeResult.grade==="A"&&<><div style={{fontSize:12,color:C.blue,fontWeight:700,marginBottom:3}}>A — Good Setup</div><div style={{fontSize:11,color:C.textMid,lineHeight:1.5}}>One piece missing. Still valid.</div></>}
                </div>
              </div>
            </div>
          )}

          {/* ══ CALCULATOR ══ */}
          {tab==="Calculator"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Sect>Position Size Calculator</Sect>
              <PositionCalc C={C} isDark={isDark}/>
            </div>
          )}

          {/* ══ CRYPTO ══ */}
          {tab==="Crypto"&&(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <Sect>Crypto Portfolio</Sect>
              <CryptoTracker C={C} isDark={isDark}/>
            </div>
          )}

        </div>
      </div>

      {/* TRADE DETAIL SLIDE-OUT */}
      {detailTrade&&(
        <>
          <div onClick={()=>setDetailTrade(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:190}}/>
          <TradeDetail trade={detailTrade} C={C} isDark={isDark} onClose={()=>setDetailTrade(null)}/>
        </>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<NVJournal/>);
  </script>
</body>
</html>
